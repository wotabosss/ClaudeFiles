<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON &amp; ROAD — V10</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ════════ IRON & ROAD — design system ════════
   Palette from IWF calibrated plates:
   red 25kg = lifts · blue 20kg = road · yellow 15kg = caution · green 10kg = done */
:root {
  --bg: #121110;          /* rubber floor */
  --surface: #1B1A18;
  --raised: #26241F;
  --line: #36332C;
  --bone: #F2EFE7;
  --ink: #141311;
  --text: #F2EFE7;
  --text-2: #A39E93;
  --text-3: #6E695F;
  --red: #E8443A;
  --blue: #3D7BFF;
  --yellow: #F2C12E;
  --green: #37C871;
  --purple: #9A6BFF;
  --r: 18px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Barlow Semi Condensed', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15.5px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 18px 16px calc(94px + env(safe-area-inset-bottom));
}

/* ── Header ── */
.eyebrow {
  font-size: 12px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 2px;
}
h1 {
  font-family: 'Anton', 'Barlow Semi Condensed', sans-serif;
  font-size: 30px; font-weight: 400;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text); margin-bottom: 14px;
}
.vbadge {
  font-family: 'Barlow Semi Condensed', sans-serif;
  font-size: 11px; font-weight: 800; color: var(--bone);
  background: var(--red); border-radius: 6px; padding: 2px 7px;
  vertical-align: middle; margin-left: 6px; letter-spacing: 0.5px;
}
.subtitle { display: none; }
.header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.header-icons { display: flex; gap: 8px; padding-top: 12px; }
.icon-btn {
  background: var(--surface); border: 1px solid var(--line); color: var(--text);
  width: 38px; height: 38px; border-radius: 12px; font-size: 14px; cursor: pointer;
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
}
.card-label {
  font-size: 11px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 10px;
}
.section-title { font-size: 20px; font-weight: 700; margin: 18px 0 10px; }

/* Load-in stagger */
@media (prefers-reduced-motion: no-preference) {
  #content > * { animation: rise .38s cubic-bezier(.2,.7,.3,1) backwards; }
  #content > *:nth-child(2) { animation-delay: .05s; }
  #content > *:nth-child(3) { animation-delay: .10s; }
  #content > *:nth-child(4) { animation-delay: .15s; }
  #content > *:nth-child(5) { animation-delay: .20s; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }
}

/* ── THE BIB (signature: today's session as a race bib) ── */
.bib {
  position: relative;
  background: var(--bone);
  color: var(--ink);
  border-radius: var(--r);
  padding: 18px 18px 16px 26px;
  margin-bottom: 12px;
  overflow: hidden;
}
.bib::before { /* plate stripe */
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: var(--red);
}
.bib.done::before { background: var(--green); }
.bib[style*="--stripe"]::before { background: var(--stripe); }
.bib::after { /* perforation */
  content: ''; position: absolute; top: 10px; bottom: 10px; left: 9px; width: 4px;
  background-image: radial-gradient(circle, rgba(20,19,17,0.22) 1.6px, transparent 1.7px);
  background-size: 4px 9px; background-repeat: repeat-y;
}
.bib-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: rgba(20,19,17,0.55); margin-bottom: 4px; }
.bib-title {
  font-family: 'Anton', sans-serif; font-weight: 400;
  font-size: 34px; text-transform: uppercase; letter-spacing: 1px;
  line-height: 1; margin-bottom: 6px;
}
.bib-meta { font-size: 13px; font-weight: 600; color: rgba(20,19,17,0.65); margin-bottom: 4px; }
.bib-run {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 700; color: var(--ink);
  margin: 8px 0 12px;
}
.bib-run .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
.bib .btn { width: 100%; padding: 13px; font-size: 15px; }
.bib-stamp {
  display: inline-block; font-family: 'Anton', sans-serif; font-size: 18px;
  letter-spacing: 2px; color: var(--green);
  border: 2px solid var(--green); border-radius: 8px;
  padding: 3px 12px; transform: rotate(-3deg); margin-bottom: 10px;
}

/* ── Plate-loader weekly progress ── */
.plate-row { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; }
.plate-track { display: flex; gap: 5px; flex: 1; }
.plate {
  flex: 1; height: 26px; border-radius: 7px;
  background: var(--raised);
  border: 1px solid rgba(255,255,255,0.05);
  transition: background .25s, box-shadow .25s;
}
.plate.lift.full { background: linear-gradient(180deg, #F25549, var(--red)); box-shadow: inset 0 1px 0 rgba(255,255,255,0.25); }
.plate.run.full  { background: linear-gradient(180deg, #5B90FF, var(--blue)); box-shadow: inset 0 1px 0 rgba(255,255,255,0.25); }
.plate-stat { font-size: 16px; font-weight: 800; min-width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
.plate-name { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; width: 44px; }

.road-line { position: relative; flex: 1; height: 4px; border-radius: 2px; background: var(--raised); }
.road-fill { position: absolute; inset: 0 auto 0 0; border-radius: 2px; background: var(--blue); transition: width .3s; }
.road-runner { position: absolute; top: 50%; width: 11px; height: 11px; border-radius: 50%; background: var(--bone); border: 3px solid var(--blue); transform: translate(-50%,-50%); transition: left .3s; }

/* week dots + streak */
.wk-row { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--line); }
.wk-dots { display: flex; gap: 9px; }
.wk-dot { text-align: center; }
.wk-dot .d { width: 9px; height: 9px; border-radius: 50%; background: var(--raised); margin: 0 auto 3px; }
.wk-dot.on .d { background: var(--green); }
.wk-dot.today .d { box-shadow: 0 0 0 2px rgba(242,239,231,0.35); }
.wk-dot span { font-size: 9px; font-weight: 700; color: var(--text-3); }
.streak-chip { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 800; color: var(--yellow); }

/* ── Quote ── */
.quote {
  font-family: Georgia, 'Times New Roman', serif;
  font-style: italic; font-size: 16.5px; line-height: 1.5;
  color: var(--text); border-left: 3px solid var(--red);
  padding-left: 13px;
}

/* ── Training ledger (10-week dot grid) ── */
.ledger { display: flex; gap: 5px; justify-content: space-between; }
.ledger-col { display: flex; flex-direction: column; gap: 5px; }
.lg {
  width: 13px; height: 13px; border-radius: 4px; background: var(--raised);
}
.lg.lift { background: var(--red); }
.lg.run { background: var(--blue); }
.lg.both { background: var(--yellow); }
.lg.today { box-shadow: 0 0 0 1.5px rgba(242,239,231,0.5); }
.ledger-key { display: flex; gap: 14px; margin-top: 10px; font-size: 10px; color: var(--text-3); font-weight: 600; }
.ledger-key i { display: inline-block; width: 9px; height: 9px; border-radius: 3px; margin-right: 4px; vertical-align: -1px; }

/* ── Buttons ── */
.btn {
  background: var(--red); color: var(--bone);
  border: none; border-radius: 12px;
  padding: 10px 14px; font-size: 14px; font-weight: 800;
  letter-spacing: 0.3px; cursor: pointer;
  font-family: inherit;
}
.btn:active { opacity: .8; }
.btn-small {
  background: var(--raised); color: var(--text);
  border: 1px solid var(--line); border-radius: 10px;
  padding: 7px 11px; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit;
}
.reset-btn {
  background: var(--raised); border: 1px solid var(--line); color: var(--text);
  border-radius: 20px; padding: 8px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
}

/* ── Tabs (bottom) ── */
.tabs {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-around;
  background: rgba(18,17,16,0.92);
  -webkit-backdrop-filter: blur(22px); backdrop-filter: blur(22px);
  border-top: 1px solid rgba(255,255,255,0.07);
  padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--text-3);
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
  cursor: pointer; padding: 4px 0; font-family: inherit;
}
.tab svg { width: 24px; height: 24px; }
.tab.active { color: var(--red); }

/* ── Week segmented control ── */
.week-seg {
  display: flex; gap: 4px; background: var(--surface);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 14px; padding: 4px; margin-bottom: 12px;
}
.week-seg button {
  flex: 1; background: transparent; border: none; color: var(--text-2);
  border-radius: 11px; padding: 12px; font-size: 14px; font-weight: 800;
  cursor: pointer; transition: background .15s, color .15s; font-family: inherit;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.week-seg button.active { background: var(--red); color: var(--bone); }

/* ── Day chips ── */
.day-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 14px; }
.day-btn {
  background: var(--surface); border: 1px solid rgba(255,255,255,0.04);
  color: var(--text-2); border-radius: 14px;
  padding: 0 4px; font-size: 12px; font-weight: 700; cursor: pointer; text-align: center;
  min-height: 56px; height: 56px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  font-family: inherit;
}
.day-btn.active { background: var(--red); border-color: var(--red); color: var(--bone); }
.day-name { font-size: 12.5px; font-weight: 800; line-height: 1.1; text-transform: uppercase; letter-spacing: 0.3px; }
.day-sub { font-size: 9px; font-weight: 600; opacity: .65; line-height: 1; }

/* ── Sticky session progress ── */
.session-bar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 10px;
  background: rgba(18,17,16,0.9);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  margin: 0 -16px 12px; padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sb-track { flex: 1; height: 5px; border-radius: 3px; background: var(--raised); overflow: hidden; }
.sb-fill { height: 100%; background: var(--red); border-radius: 3px; transition: width .3s; }
.sb-count { font-size: 12px; font-weight: 800; color: var(--text-2); white-space: nowrap; font-variant-numeric: tabular-nums; }

/* ── Exercise cards (collapsible) ── */
.card-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; cursor: pointer; }
.exercise-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
.exercise-name { font-size: 17px; font-weight: 800; letter-spacing: -0.1px; }
.exercise-meta { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.target-sets { font-size: 12px; font-weight: 700; color: var(--text-2); white-space: nowrap; }
.head-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.spark { display: block; }
.done-chip {
  font-size: 11px; font-weight: 800; color: var(--green);
  border: 1.5px solid var(--green); border-radius: 8px; padding: 2px 7px;
  letter-spacing: 0.5px;
}
.chev { color: var(--text-3); font-size: 12px; transition: transform .2s; }
.chev.open { transform: rotate(180deg); }
.card-body { margin-top: 12px; }
.card.complete-card { border-color: rgba(55,200,113,0.25); }

.recommendation {
  font-size: 12.5px; line-height: 1.5; padding: 10px 12px;
  border-radius: 12px; margin-bottom: 10px; background: var(--raised);
}
.rec-start  { box-shadow: inset 3px 0 0 var(--blue); }
.rec-push   { box-shadow: inset 3px 0 0 var(--green); }
.rec-hold   { box-shadow: inset 3px 0 0 var(--yellow); }
.rec-deload { box-shadow: inset 3px 0 0 var(--red); }

.last-session {
  font-size: 12px; color: var(--text-2); margin-bottom: 10px;
  padding: 8px 12px; background: var(--raised); border-radius: 10px;
}
.last-session strong { color: var(--text); }

/* ── Set logging ── */
.todays-sets-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; font-weight: 700; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 1px; margin: 12px 0 6px;
}
.set-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 10px;
  background: var(--raised); margin-bottom: 6px;
}
.set-row.complete { background: rgba(55,200,113,0.10); }
.set-row.warmup { background: rgba(242,193,46,0.10); }
.set-row.warmup .set-value { color: var(--yellow); }
.set-row.dropset { background: rgba(61,123,255,0.10); }
.set-row.dropset .set-value { color: var(--blue); }
.set-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--line); color: var(--text);
  font-size: 11px; font-weight: 800;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.set-num.complete { background: var(--green); color: var(--ink); }
.set-num.warmup { background: var(--yellow); color: var(--ink); }
.set-num.dropset { background: var(--blue); color: var(--bone); }
.set-value { flex: 1; font-size: 14px; font-weight: 600; }
.delete-btn { background: none; border: none; color: var(--text-3); font-size: 16px; cursor: pointer; padding: 2px 6px; }

.log-form { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
.log-form input {
  flex: 1; min-width: 0; background: var(--raised); color: var(--text);
  border: 1px solid var(--line); border-radius: 10px;
  padding: 11px 12px; font-size: 16px; font-weight: 600; font-family: inherit;
}
.log-form input::placeholder { color: var(--text-3); font-weight: 500; }

.set-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.set-options button {
  flex: 1; min-width: 88px; background: var(--raised); border: 1px solid var(--line);
  color: var(--text-2); border-radius: 10px;
  padding: 9px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.set-options .btn-finish { color: var(--green); border-color: rgba(55,200,113,0.4); }
.set-options .btn-reopen { color: var(--text); }
.finish-confirm { background: #2a2616; border: 1px solid rgba(242,193,46,0.4); border-radius: 12px; padding: 10px 12px; margin-top: 10px; }
.fc-q { font-size: 13px; font-weight: 700; color: #F2C12E; margin-bottom: 8px; }
.fc-sub { font-size: 11px; font-weight: 600; color: var(--text-2); }
.fc-btns { display: flex; gap: 8px; }
.fc-btns button { flex: 1; border-radius: 10px; padding: 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.fc-more { background: var(--raised); border: 1px solid var(--line); color: var(--text); }
.fc-done { background: var(--green); border: 1px solid var(--green); color: #0c2417; }

.history { margin-top: 10px; border-top: 1px solid var(--line); padding-top: 8px; }
.history-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-2); padding: 5px 0; }
.history-toggle { font-size: 12px; color: var(--blue); background: none; border: none; cursor: pointer; }

/* ── Rest timer ── */
.rest-timer {
  position: fixed; right: 14px; bottom: calc(96px + env(safe-area-inset-bottom)); z-index: 90;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.6);
  cursor: grab; touch-action: none; user-select: none; -webkit-user-select: none;
}
.rest-timer.dragging { cursor: grabbing; opacity: 0.92; box-shadow: 0 12px 36px rgba(0,0,0,0.7); }
.timer-grip { color: var(--text-3); font-size: 14px; line-height: 1; letter-spacing: -1px; padding-right: 2px; }

/* ── Swap sheet ── */
.swap-modal { position: fixed; inset: 0; z-index: 200; display: none; }
.swap-modal.show { display: block; }
.swap-modal::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.62); }
.swap-sheet {
  position: absolute; left: 0; right: 0; bottom: 0; max-height: 82vh; overflow-y: auto;
  background: var(--surface); border-top-left-radius: 22px; border-top-right-radius: 22px;
  border-top: 1px solid var(--line);
  padding: 16px 16px calc(22px + env(safe-area-inset-bottom));
  box-shadow: 0 -12px 44px rgba(0,0,0,0.6);
  animation: swapUp 0.2s ease;
}
@keyframes swapUp { from { transform: translateY(16px); opacity: 0.4; } to { transform: translateY(0); opacity: 1; } }
.swap-head { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 15px; margin-bottom: 2px; }
.swap-close { background: var(--raised); border: 1px solid var(--line); color: var(--text); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 13px; }
.swap-sub { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 1px; margin: 8px 0 4px; }
.swap-current { font-size: 12px; color: var(--text-2); margin-bottom: 12px; }
.swap-current strong { color: var(--text); }
.swap-item { display: block; width: 100%; text-align: left; background: var(--raised); border: 1px solid var(--line); color: var(--text); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; cursor: pointer; font-family: inherit; }
.swap-item:active { background: #2f2c26; }
.swap-item-name { font-size: 14px; font-weight: 600; }
.swap-item-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.swap-best { font-size: 9px; color: var(--bone); background: var(--red); padding: 1px 6px; border-radius: 8px; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
.swap-reset { display: block; width: 100%; text-align: center; background: transparent; border: 1px dashed var(--line); color: var(--text-2); border-radius: 12px; padding: 11px; margin-top: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
.swap-reset:active { background: var(--raised); }
.swap-empty { color: var(--text-2); font-size: 12px; padding: 18px 0; text-align: center; }
.rest-timer.warning { border-color: var(--red); }
.rest-timer.warning .timer-label { color: var(--red); }
.timer-display { font-family: 'Anton', sans-serif; font-size: 21px; font-weight: 400; letter-spacing: 1px; font-variant-numeric: tabular-nums; }
.timer-label { font-size: 9px; color: var(--text-2); text-transform: uppercase; letter-spacing: 1px; }
.timer-btn { background: var(--raised); border: 1px solid var(--line); color: var(--text); width: 32px; height: 32px; border-radius: 50%; font-size: 13px; cursor: pointer; }

/* ── Misc ── */
.autosave-note { font-size: 11px; color: var(--text-3); margin-bottom: 10px; text-align: center; }
.empty { text-align: center; color: var(--text-2); padding: 36px 16px; }
.reorder-toggle {
  width: 100%; background: var(--surface); border: 1px solid var(--line);
  color: var(--text-2); border-radius: 12px; padding: 10px;
  font-size: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-family: inherit;
}
.reorder-toggle.active { background: var(--red); border-color: var(--red); color: var(--bone); }
.move-buttons { display: flex; gap: 6px; }
.move-btn { background: var(--raised); border: 1px solid var(--line); color: var(--text); border-radius: 8px; width: 64px; height: 34px; font-size: 13px; cursor: pointer; }
.reorder-handle { color: var(--text-3); }

.filter-chip, .progress-day-filter button {
  background: var(--surface); border: 1px solid var(--line); color: var(--text-2);
  border-radius: 18px; padding: 7px 13px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.filter-chip.active, .progress-day-filter button.active { background: var(--red); border-color: var(--red); color: var(--bone); }
.progress-day-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

.chart { display: flex; align-items: flex-end; gap: 3px; height: 90px; margin-top: 8px; }
.bar { background: linear-gradient(180deg, #F25549, var(--red)); border-radius: 3px; flex: 1; }
.delta-up { color: var(--green); }
.delta-down { color: var(--red); }
.delta-flat { color: var(--text-2); }

/* Personal bests */
.pr-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 8px 0; border-bottom: 1px solid var(--line);
}
.pr-row:last-child { border-bottom: none; }
.pr-name { font-size: 13.5px; font-weight: 700; }
.pr-val { font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: 0.5px; color: var(--red); }
.pr-sub { font-size: 11px; color: var(--text-3); margin-left: 6px; font-family: 'Barlow Semi Condensed', sans-serif; }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div>
      <p class="eyebrow" id="todayDate"></p>
      <h1>Iron &amp; Road <span class="vbadge">V10</span></h1>
    </div>
    <div class="header-icons">
      <button class="icon-btn" onclick="importData()" title="Restore from backup JSON">📥</button>
      <button class="icon-btn" onclick="exportData()" title="Export all data as JSON">💾</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5.5"/><circle cx="12" cy="12" r="2"/></svg>
      <span>Summary</span>
    </button>
    <button class="tab" data-tab="track">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="9" width="3" height="6" rx="1"/><rect x="5" y="6" width="3" height="12" rx="1"/><rect x="16" y="6" width="3" height="12" rx="1"/><rect x="20" y="9" width="3" height="6" rx="1"/><rect x="8" y="10.7" width="8" height="2.6" rx="1.3"/></svg>
      <span>Weights</span>
    </button>
    <button class="tab" data-tab="running">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="13" cy="13" r="8"/><path d="M13 9v4l2.5 2.5"/><path d="M11 2h4"/><path d="M19 5l1.5-1.5"/></svg>
      <span>Running</span>
    </button>
    <button class="tab" data-tab="fuel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1"><path d="M12 21c-4 0-6.5-2.6-6.5-6.2C5.5 10 9 7.5 9.5 4c2.3 1.6 3 3.8 2.8 5.8 1.2-.6 2-1.7 2.2-3.2 2.6 2 4 4.6 4 8.2 0 3.6-2.5 6.2-6.5 6.2z"/></svg>
      <span>Fuel</span>
    </button>
    <button class="tab" data-tab="progress">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="13" width="4" height="8" rx="1.2"/><rect x="10" y="8" width="4" height="13" rx="1.2"/><rect x="17" y="3" width="4" height="18" rx="1.2"/></svg>
      <span>Progress</span>
    </button>
  </div>

  <div id="content"><div class="empty">Loading...</div></div>
</div>

<!-- Floating Rest Timer -->
<div class="rest-timer" id="restTimer">
  <div class="timer-grip" aria-hidden="true">⠿</div>
  <div>
    <div class="timer-label">Rest</div>
    <div class="timer-display" id="timerDisplay">2:30</div>
  </div>
  <button class="timer-btn" id="timerStartBtn" onclick="toggleTimer()">▶</button>
  <button class="timer-btn" onclick="resetTimer()">↻</button>
</div>

<!-- Exercise Swap Sheet -->
<div class="swap-modal" id="swapModal" onclick="if(event.target===this)closeSwap()">
  <div class="swap-sheet">
    <div class="swap-head">
      <span>Swap exercise</span>
      <button class="swap-close" onclick="closeSwap()">✕</button>
    </div>
    <div class="swap-body" id="swapBody"></div>
  </div>
</div>

  }

      if (localW) currentWeek = localW;

    if (lc && lc.value) lastCompleted = JSON.parse(lc.value);
  } catch (e) { lastCompleted = {}; }
  // Fallback: localStorage

  } catch (e) {
    try { const localMD = localStorage.getItem('gym-tracker-manual-done'); if (localMD) manualDone = JSON.parse(localMD); } catch (e2) {}
  }
  // Early-finish marks are today-only; drop anything left over from previous days
  { const t = localDateStr(new Date()); for (const k of Object.keys(manualDone)) if (manualDone[k] !== t) delete manualDone[k]; }

  } catch (e) {

  const applySwaps = (saved) => {

      SPLIT[dayKey].exercises = SPLIT[dayKey].exercises.map(ex => {

      if (localO) applyOrder(JSON.parse(localO));
    } catch (e2) {}
  }
  render();
  updateTimerUI();
}

// ===== STORAGE MANAGEMENT =====
const MAX_RUNS = 10000; // keep last 10,000 runs (~1MB, covers 5+ years of 3 runs/week)
const MAX_LIFT_LOGS_PER_EXERCISE = 1000; // keep last 1000 sets per exercise (~35KB per exercise, covers 5+ years of training)

function enforceStorageLimit() {
  // Remove oldest running logs if over limit
  if (runningLogs.length > MAX_RUNS) {
    runningLogs.sort((a, b) => new Date(a.date) - new Date(b.date));
    runningLogs = runningLogs.slice(-MAX_RUNS); // keep last MAX_RUNS
  }
  
  // Remove oldest lift logs per exercise if over limit
  for (const exId in logs) {
    if (logs[exId].length > MAX_LIFT_LOGS_PER_EXERCISE) {
      logs[exId].sort((a, b) => new Date(a.date) - new Date(b.date));
      logs[exId] = logs[exId].slice(-MAX_LIFT_LOGS_PER_EXERCISE); // keep last MAX
    }
  }
}

async function save() {
  enforceStorageLimit();
  try { await window.storage.set('lift-logs', JSON.stringify(logs)); } catch(e) {}

  // Fallback: also save to localStorage for offline/downloaded file usage
  try { localStorage.setItem('gym-tracker-running-logs', JSON.stringify(runningLogs)); } catch(e) {}
  try { localStorage.setItem('gym-tracker-lift-logs', JSON.stringify(logs)); } catch(e) {}

// ===== Exercise swap =====
// Build a replacement exercise from the catalog, preserving the slot's set count (volume).
function buildSwapEx(newId, origId, sets) {
  const def = EX_CATALOG[newId];
  const ex = { id: newId, origId: origId, name: def.name, sets: sets, reps: def.reps, notes: def.notes };
  if (def.warmup) ex.warmup = true;
  if (def.bodyweight) ex.bodyweight = true;
  return ex;
}

let swapTargetIdx = null;

function openSwap(idx) {
  swapTargetIdx = idx;
  renderSwapModal();
  const m = document.getElementById('swapModal');
  if (m) m.classList.add('show');
}
function closeSwap() {
  const m = document.getElementById('swapModal');
  if (m) m.classList.remove('show');
  swapTargetIdx = null;
}

function renderSwapModal() {
  const body = document.getElementById('swapBody');
  if (!body || swapTargetIdx === null) return;
  const cur = SPLIT[selectedDay].exercises[swapTargetIdx];
  const meta = EX_CATALOG[cur.id];
  if (!meta) { body.innerHTML = '<div class="swap-empty">No alternatives stored for this exercise.</div>'; return; }
  const group = meta.group;
  // Same muscle group only; drop the current exercise and any duplicate display names
  const seen = new Set([cur.name]);
  const cands = Object.keys(EX_CATALOG)
    .filter(id => EX_CATALOG[id].group === group && id !== cur.id)
    .map(id => Object.assign({ id }, EX_CATALOG[id]))
    .filter(c => { if (seen.has(c.name)) return false; seen.add(c.name); return true; });
  // Same movement pattern first ("best match"), then alphabetical
  cands.sort((a, b) => {
    const ap = a.pattern === meta.pattern ? 0 : 1, bp = b.pattern === meta.pattern ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return a.name.localeCompare(b.name);
  });
  const swapped = cur.origId && cur.id !== cur.origId;
  let html = `<div class="swap-sub">${GROUP_LABEL[group] || group} · keeps ${cur.sets} sets</div>`;
  html += `<div class="swap-current">Currently: <strong>${cur.name}</strong></div>`;
  if (cands.length === 0) {
    html += `<div class="swap-empty">No other ${GROUP_LABEL[group] || group} exercises stored yet.</div>`;
  } else {
    html += cands.map(c => {
      const best = c.pattern === meta.pattern;
      return `<button class="swap-item" onclick="doSwap('${c.id}')">
        <div class="swap-item-name">${c.name}${best ? ' <span class="swap-best">best match</span>' : ''}</div>
        <div class="swap-item-meta">${c.equip} · ${c.reps} reps</div>
      </button>`;
    }).join('');
  }
  if (swapped) {
    const orig = EX_CATALOG[cur.origId];
    html += `<button class="swap-reset" onclick="doSwap('${cur.origId}')">↺ Reset to original${orig ? ` — ${orig.name}` : ''}</button>`;
  }
  body.innerHTML = html;
}

async function doSwap(newId) {
  if (swapTargetIdx === null) return;
  const day = SPLIT[selectedDay];
  const cur = day.exercises[swapTargetIdx];
  if (!EX_CATALOG[newId]) { closeSwap(); return; }
  const origId = cur.origId || cur.id;
  day.exercises[swapTargetIdx] = buildSwapEx(newId, origId, cur.sets);
  cardOpen[newId] = true;
  if (newId === origId) {
    if (swaps[selectedDay]) { delete swaps[selectedDay][origId]; if (!Object.keys(swaps[selectedDay]).length) delete swaps[selectedDay]; }
  } else {
    if (!swaps[selectedDay]) swaps[selectedDay] = {};
    swaps[selectedDay][origId] = newId;
  }
  await saveSwaps();
  await saveOrder(); // keep saved order ids in sync with the new id
  closeSwap();
  render();
}

function getLastCompletedForDay(dayKey) {
  if (!lastCompleted[dayKey]) return null;
  const d = new Date(lastCompleted[dayKey]);
  const now = new Date();
  const daysDiff = Math.floor((now - d) / 86400000);
  if (daysDiff === 0) return 'today';
  if (daysDiff === 1) return 'yesterday';
  return `${daysDiff}d ago`;
}

async function markDayComplete(dayKey) {
  lastCompleted[dayKey] = new Date().toISOString();
  await saveLastCompleted();
}

function getWarmupRamp(workingWeight) {
  // Calculate warmup sets based on working weight (assumes 20kg barbell)
  const BAR = 20;
  if (!workingWeight || workingWeight <= BAR) return null;
  
  const ramp = [];
  // Empty bar
  ramp.push({ weight: BAR, reps: 10, label: 'Bar' });
  // ~50%
  const w50 = roundToPlate(workingWeight * 0.5);
  if (w50 > BAR) ramp.push({ weight: w50, reps: 5, label: '50%' });
  // ~70%
  const w70 = roundToPlate(workingWeight * 0.7);
  if (w70 > w50) ramp.push({ weight: w70, reps: 3, label: '70%' });
  // ~85%
  const w85 = roundToPlate(workingWeight * 0.85);
  if (w85 > w70) ramp.push({ weight: w85, reps: 1, label: '85%' });
  
  return ramp;
}

function roundToPlate(weight) {
  // Round to nearest 2.5kg (smallest practical plate increment per side = 1.25kg = 2.5kg total)
  return Math.round(weight / 2.5) * 2.5;
}

async function undoMarkDayComplete(dayKey) {
  delete lastCompleted[dayKey];
  await saveLastCompleted();
}

function groupByDate(exLogs) {
  const map = {};
  for (const log of exLogs) {
    const day = log.date.slice(0, 10);
    if (!map[day]) map[day] = { date: log.date, sets: [] };
    map[day].sets.push({ weight: log.weight, reps: log.reps, fullDate: log.date });
  }
  Object.values(map).forEach(d => d.sets.sort((a,b) => new Date(a.fullDate) - new Date(b.fullDate)));
  return Object.values(map).sort((a,b) => new Date(b.date) - new Date(a.date));
}

function avgE1RM(sets) {
  const working = sets.filter(s => s.tag !== 'warmup' && s.tag !== 'dropset');
  const src = working.length > 0 ? working : sets; // fallback to all if no working sets
  const e1rms = src.map(s => s.weight * (1 + s.reps / 30));
  return e1rms.reduce((a,b) => a+b, 0) / e1rms.length;
}


function formatSets(sets) {
  const working = sets.filter(s => s.tag !== 'warmup' && s.tag !== 'dropset');
  const src = working.length > 0 ? working : sets;
  const fmtW = (s) => s.weight === 0 || s.bw ? 'BW' : s.weight + 'kg';
  if (src.every(s => s.weight === src[0].weight && s.reps === src[0].reps)) {
    return `${src.length}×${src[0].reps} @ ${fmtW(src[0])}`;
  }
  return src.map(s => `${fmtW(s)}×${s.reps}`).join(', ');
}

function localDateStr(date) {
  // Returns YYYY-MM-DD in the user's LOCAL timezone — not UTC
  const d = new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Days elapsed since Monday (0=Mon, 1=Tue, ... 6=Sun) — weeks start on Monday
function daysSinceMonday(d) { return (d.getDay() + 6) % 7; }

function daysAgo(date) {
  const today = localDateStr(new Date());
  const then = localDateStr(date);
  const diffMs = new Date(today) - new Date(then);
  const d = Math.round(diffMs / 86400000);
  if (d === 0) return 'today';
  if (d === 1) return 'yesterday';
  return `${d}d ago`;
}

function getTodaysSets(exId) {
  // Day-aware: shared exercises (e.g. tp-cable on push-1 AND sa-1) must not leak
  // sets between days logged on the same date. Untagged legacy sets still show.
  const today = localDateStr(new Date());
  return (logs[exId] || [])
    .filter(l => localDateStr(l.date) === today && (!l.day || !selectedDay || l.day === selectedDay))
    .sort((a,b) => new Date(a.date) - new Date(b.date));
}

function parseRepRange(repsStr) {
  // Parse "5–8", "12-20", "10–12", "AMRAP" etc. Returns {low, high} or null
  if (!repsStr) return { low: 8, high: 12 }; // sensible default
  const nums = repsStr.match(/\d+/g);
  if (!nums || nums.length === 0) return { low: 8, high: 12 };
  if (nums.length === 1) return { low: parseInt(nums[0]), high: parseInt(nums[0]) };
  return { low: parseInt(nums[0]), high: parseInt(nums[1]) };
}

function getEquipment(exId) {
  // Infer from the exercise NAME — IDs lie (lr-db is actually a cable D-handle)
  let name = '';
  for (const day of Object.values(SPLIT)) {
    const ex = day.exercises.find(e => e.id === exId);
    if (ex) { name = ex.name.toLowerCase(); break; }
  }
  if (/cable/.test(name)) return 'cable';
  if (/machine|smith/.test(name)) return 'machine';
  if (/\bdb\b|dumbbell/.test(name)) return 'db';
  if (/\bbb\b|barbell|ez bar/.test(name)) return 'bb';
  return 'other';
}

function getLoadJump(weight, low, high, exId) {
  // Real-world increments only — never suggest a jump the equipment can't make
  if (weight === 0) return 2.5;             // bodyweight → first load is a 2.5kg belt
  const eq = exId ? getEquipment(exId) : 'other';
  if (eq === 'db') return weight < 10 ? 1 : 2;        // dumbbell racks: 1kg steps small, 2kg after
  if (eq === 'bb') return 2.5;                         // 1.25 plates per side
  if (eq === 'cable' || eq === 'machine') return 2.5;  // one stack pin
  return weight < 10 ? 1 : 2.5;
}

function getSessionPosition(exId, dateKey, dayKey) {
  // Where in the session this exercise was done that day (0 = first, by first working set time)
  const firsts = [];
  for (const [id, entries] of Object.entries(logs)) {
    let first = null;
    for (const l of entries) {
      if (localDateStr(l.date) !== dateKey) continue;
      if (dayKey && l.day && l.day !== dayKey) continue;
      if (l.tag === 'warmup' || l.tag === 'dropset') continue;
      if (!first || new Date(l.date) < new Date(first)) first = l.date;
    }
    if (first) firsts.push({ id, t: new Date(first).getTime() });
  }
  firsts.sort((a, b) => a.t - b.t);
  const i = firsts.findIndex(f => f.id === exId);
  return i === -1 ? null : i;
}

function getRec(exId, targetSets, repsStr, dayKey, todayPos) {
  const todayStr = localDateStr(new Date());
  const { low, high } = parseRepRange(repsStr);
  const rangeText = low === high ? `${low}` : `${low}–${high}`;
  
  const allLogs = (logs[exId] || []).filter(l => localDateStr(l.date) !== todayStr);
  const taggedLogs = allLogs.filter(l => l.day === dayKey);
  const exLogs = taggedLogs.length > 0 ? taggedLogs : allLogs.filter(l => !l.day);
  
  const sorted = exLogs.slice().sort((a,b) => new Date(b.date) - new Date(a.date));

  if (sorted.length === 0) {
    return { type: 'start', text: `🎯 First session on this day. Pick a weight you can hit ${targetSets} sets of ${rangeText} reps with solid form. Log it and I'll track your progression from here.` };
  }
  
  const sessions = groupByDate(sorted);
  const latest = sessions[0];
  
  const latestWorking = latest.sets.filter(s => s.tag !== 'warmup' && s.tag !== 'dropset');
  if (latestWorking.length === 0) {
    return { type: 'start', text: `🎯 Only warmup sets logged last session. Log your working sets and I'll start tracking progression.` };
  }
  
  const latestTop = Math.max(...latestWorking.map(s => s.weight));
  // Judge reps ONLY on sets performed at the top working weight. Averaging reps
  // across mixed loads (a light high-rep set + heavy low-rep sets) yields a
  // meaningless number and produces advice that contradicts the actual sets.
  const latestTopSets = latestWorking.filter(s => s.weight === latestTop);
  const latestAvgReps = latestTopSets.reduce((a,s) => a+s.reps, 0) / latestTopSets.length;
  const latestMinReps = Math.min(...latestTopSets.map(s => s.reps));
  const latestE1RM = avgE1RM(latestWorking);
  const jump = getLoadJump(latestTop, low, high, exId);
  const isBW = latestTop === 0;
  const topDisplay = isBW ? 'BW' : latestTop + 'kg';
  const nextDisplay = isBW ? 'BW +2.5kg' : (latestTop + jump).toFixed(2).replace(/\.?0+$/, '') + 'kg';
  
  // Gate loading: high-rep work AND any jump >15% of current load must own the
  // TOP of the range on EVERY set first (one stack pin at 12.5kg is a 20% jump)
  const isHighRep = high >= 15;
  const bigRelativeJump = !isBW && latestTop > 0 && (jump / latestTop) > 0.15;
  const strictGate = isHighRep || bigRelativeJump;
  const readyToLoad = strictGate ? latestMinReps >= high : latestAvgReps >= high;
  const gateNote = bigRelativeJump ? ` (+${jump}kg here is ${Math.round(jump/latestTop*100)}% — every set must earn it)` : '';
  
  // Fatigue context: today's slot vs the slot in the comparison session
  let fatigueNote = '';
  let fatigueSaves = false;
  if (todayPos !== undefined && todayPos !== null) {
    const prevPos = getSessionPosition(exId, localDateStr(latest.date), dayKey);
    if (prevPos !== null) {
      const delta = todayPos - prevPos;
      if (delta >= 2) {
        fatigueNote = ` ⚠ Slotted ${delta} spots later than last time — expect ~5% less under fatigue. Matching last session IS progress here.`;
        fatigueSaves = true;
      } else if (delta <= -2) {
        fatigueNote = ` ⚡ ${Math.abs(delta)} spots fresher than last time — good day to attack the top of the range.`;
      }
    }
  }

  if (sessions.length === 1) {
    const rec = `Last: ${formatSets(latestWorking)}`;
    if (readyToLoad) {
      return { type: 'push', text: `${rec}. Hit the top of your ${rangeText} range — add load. ${strictGate ? `${nextDisplay}${gateNote}, reset to ${low} reps and build back up.` : `Try ${nextDisplay}, aim for ${low}+ reps.`}${fatigueNote}` };
    } else if (latestAvgReps >= low) {
      return { type: 'hold', text: `${rec}. In range. The lever is reps: push toward ${high} at ${topDisplay}${strictGate ? ' on every set' : ''}. Hit ${high}${strictGate ? ' across the board' : ''} → ${nextDisplay}.${fatigueNote}` };
    } else {
      return { type: 'hold', text: `${rec}. Below your ${rangeText} target — a touch heavy. Hold ${topDisplay} and build reps to ${low}+ on every set before adding load.${fatigueNote}` };
    }
  }

  const prev = sessions[1];
  const prevWorking = prev.sets.filter(s => s.tag !== 'warmup' && s.tag !== 'dropset');
  const prevTop = prevWorking.length > 0 ? Math.max(...prevWorking.map(s => s.weight)) : 0;
  const prevTopSets = prevWorking.filter(s => s.weight === prevTop);
  const prevAvgReps = prevTopSets.length > 0 ? prevTopSets.reduce((a,s) => a+s.reps, 0) / prevTopSets.length : 0;
  const prevE1RM = avgE1RM(prevWorking.length > 0 ? prevWorking : prev.sets);
  
  const e1rmGain = ((latestE1RM - prevE1RM) / prevE1RM) * 100;
  const repGain = latestAvgReps - prevAvgReps;

  // Stall ladder: 3 flat → PUSH harder · 4 flat → deload
  const flatVals = n => sessions.slice(0, n).map(s => {
    const wk = s.sets.filter(x => x.tag !== 'warmup' && x.tag !== 'dropset');
    return avgE1RM(wk.length > 0 ? wk : s.sets);
  });
  if (sessions.length >= 4) {
    const v = flatVals(4);
    if ((Math.max(...v) - Math.min(...v)) / latestE1RM < 0.02) {
      return { type: 'deload', text: `⚠️ Four sessions flat at ${topDisplay}. You've pushed — now reset: drop to ${(latestTop * 0.88).toFixed(1)}kg for a week, move it crisply, and the rebound usually breaks the wall.` };
    }
  }
  if (sessions.length >= 3) {
    const v = flatVals(3);
    if ((Math.max(...v) - Math.min(...v)) / latestE1RM < 0.02) {
      return { type: 'push', text: `🔨 Three sessions stuck at ${topDisplay} — force it. Rest exactly 2:00, 3s eccentrics, add ONE rep to set 1. Break ${Math.min(high, Math.round(latestAvgReps) + 1)} reps and ${nextDisplay} unlocks. Still flat next time → deload.${fatigueNote}` };
    }
  }

  if (e1rmGain > 3) {
    if (readyToLoad) {
      return { type: 'push', text: `📈 +${e1rmGain.toFixed(1)}% and you've hit the ceiling of ${rangeText}. Load it: ${nextDisplay}${gateNote}${strictGate ? `, rebuild from ${low} reps` : `, aim ${low}+ reps`}.${fatigueNote}` };
    }
    return { type: 'push', text: `📈 +${e1rmGain.toFixed(1)}% stronger. Keep climbing reps toward ${high} at ${topDisplay}${strictGate ? ' on every set' : ''}. Ceiling first, then ${nextDisplay}.${fatigueNote}` };
  }
  else if (e1rmGain > 0.5) {
    if (repGain >= 2) {
      return { type: 'push', text: `✅ +${repGain.toFixed(0)} reps at ${topDisplay}. ${readyToLoad ? `You've hit ${high} — move to ${nextDisplay}${gateNote}.` : `${Math.max(1, Math.round(high - latestAvgReps))} more reps before the weight moves. Keep filling the range.`}${fatigueNote}` };
    }
    return { type: 'hold', text: `✅ Small gain. Chase ${Math.min(high, Math.ceil(latestAvgReps + 1))} reps on all sets at ${topDisplay}${strictGate ? ' — every set hits the ceiling before load moves' : ''}.${fatigueNote}` };
  }
  else if (e1rmGain >= -0.5) {
    return { type: 'hold', text: `➡️ Flat from last session. Same weight (${topDisplay}), chase +1 rep per set${fatigueNote ? '.' : ' — and check sleep and food if it happens again.'}${fatigueNote}` };
  }
  else {
    if (fatigueSaves) {
      return { type: 'hold', text: `➡️ Down ${Math.abs(e1rmGain).toFixed(1)}%, but you hit this exercise much deeper into the session than last time — that's fatigue, not lost strength. Hold ${topDisplay}; judge it next time the slot is fresh.` };
    }
    return { type: 'deload', text: `📉 Down ${Math.abs(e1rmGain).toFixed(1)}% on working sets. Don't chase it — repeat ${topDisplay} with a slow 3s eccentric, targeting ${rangeText}. Drops again next time → cut 5–10% and rebuild.${fatigueNote}` };
  }
}

function renderWeekIndicator() {
  const dEl = document.getElementById('todayDate');
  if (dEl) dEl.textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
}

function shortDayName(name) {
  // "Leg 1 (W1 - Quad Emphasis)" → "Leg 1"
  return name.replace(/\s*\(.*?\)\s*/g, '').trim();
}

async function setWeek(w) {
  if (currentWeek === w) return;
  currentWeek = w;
  selectedDay = null;
  reorderMode = false;
  await saveWeek();
  render();
}

async function toggleWeek() {
  currentWeek = currentWeek === 'A' ? 'B' : 'A';
  selectedDay = null;
  reorderMode = false;
  await saveWeek();
  render();
}

function renderDaySelector() {
  const days = currentWeek === 'A' ? WEEK_A : WEEK_B;
  const seg = `
    <div class="week-seg">
      <button class="${currentWeek === 'A' ? 'active' : ''}" onclick="setWeek('A')">Week A</button>
      <button class="${currentWeek === 'B' ? 'active' : ''}" onclick="setWeek('B')">Week B</button>
    </div>`;
  return seg + `<div class="day-selector">${days.map(key => {
    const day = SPLIT[key];
    const completedText = getLastCompletedForDay(key);
    return `
      <button class="day-btn ${selectedDay === key ? 'active' : ''}" onclick="selectDay('${key}')">
        <span class="day-name">${shortDayName(day.name)}</span>
        <span class="day-sub">${completedText ? (completedText === 'today' ? '✓ today' : 'last ' + completedText) : '&nbsp;'}</span>
      </button>`;
  }).join('')}</div>`;
}

function selectDay(key) {
  selectedDay = selectedDay === key ? null : key;
  reorderMode = false;
  cardOpen = {};
  render();
}

function renderSession() {
  if (!selectedDay) {
    return `<div class="empty"><p style="color: var(--text-2); font-size: 14px; margin-top: 20px;">👆 Pick a day above to start logging</p></div>`;
  }
  
  const day = SPLIT[selectedDay];
  // "Completed" only counts for TODAY. A day finished on an earlier date is a fresh
  // session now — show the Mark Day Complete button and empty (today-scoped) cards.
  const isCompleted = lastCompleted[selectedDay] && localDateStr(lastCompleted[selectedDay]) === localDateStr(new Date());
  
  // Session progress: exercises with all working sets logged
  const doneCount = day.exercises.filter(ex => {
    const done = getTodaysSets(ex.id).filter(s => s.tag !== 'warmup' && s.tag !== 'dropset').length;
    return done >= ex.sets || isManualDone(ex.id, selectedDay);
  }).length;
  const total = day.exercises.length;
  const pct = total > 0 ? (doneCount / total) * 100 : 0;
  
  return `
    <div class="session-bar">
      <span class="sb-count">${doneCount}/${total} lifts</span>
      <div class="sb-track"><div class="sb-fill" style="width: ${pct}%;"></div></div>
    </div>
    <button class="reorder-toggle ${reorderMode ? 'active' : ''}" onclick="toggleReorder()">
      ${reorderMode ? '✓ Done Reordering' : '↕ Reorder Exercises'}
    </button>
    ${(() => {
      let lastLogged = null;
      for (const ex of day.exercises) {
        for (const l of (logs[ex.id] || [])) {
          if (l.day !== selectedDay) continue;
          if (!lastLogged || new Date(l.date) > new Date(lastLogged)) lastLogged = l.date;
        }
      }
      return `
        <div class="section-title" style="margin-bottom:2px;">${shortDayName(day.name)} <span style="font-size:13px;color:var(--text-2);font-weight:600;">· Week ${currentWeek} · ${day.exercises.length} lifts</span></div>
        <div style="font-size:12px;color:var(--text-2);margin-bottom:4px;">${lastLogged ? 'Last logged ' + daysAgo(lastLogged) : 'First session on this day — set your baseline'}</div>
        ${(() => { const n = earlyFinishesThisWeek(); return `<div style="font-size:11px;color:${n > 0 ? '#F2C12E' : 'var(--text-3)'};margin-bottom:12px;">⚑ ${n === 0 ? 'No early finishes this week' : n + ' early finish' + (n === 1 ? '' : 'es') + ' this week'}</div>`; })()}`;
    })()}
    <div id="exerciseList">
      ${day.exercises.map((ex, idx) => renderExerciseCard(ex, idx, day.exercises.length)).join('')}
    </div>
    ${isCompleted ? `
      <div class="card" style="border-color: rgba(55,200,113,0.35); text-align: center;">
        <div style="color: var(--green); font-weight: 800; margin-bottom: 8px;">✓ Day completed</div>
        <button class="btn" style="width:100%; background: var(--raised); color: var(--text); border: 1px solid var(--line);" onclick="undoMarkDayComplete('${selectedDay}'); render();">↩ Undo</button>
      </div>
    ` : `
      <button class="btn" onclick="completeDay('${selectedDay}')" style="width:100%;margin-top:8px;padding:14px;font-size:15px;">
        ✓ Mark Day Complete
      </button>
    `}
  `;
}

function getSessionSummary(dayKey) {
  const day = SPLIT[dayKey];
  const today = localDateStr(new Date());
  const prs = [];
  const incomplete = [];
  let improved = 0, regressed = 0, flat = 0, exercisesLogged = 0;
  let volumeToday = 0, volumeLast = 0;
  let hasComparison = false;
  
  for (const ex of day.exercises) {
    const allLogs = logs[ex.id] || [];
    const todaySets = allLogs.filter(l => localDateStr(l.date) === today && l.tag !== 'warmup' && l.tag !== 'dropset');
    // Day-isolated prior history (legacy untagged fallback) — matches getRec/PR logic
    const rawPrior = allLogs.filter(l => localDateStr(l.date) !== today);
    const taggedPrior = rawPrior.filter(l => l.day === dayKey);
    const priorLogs = taggedPrior.length > 0 ? taggedPrior : rawPrior.filter(l => !l.day);
    const priorSessions = groupByDate(priorLogs); // most recent first
    
    const doneCount = todaySets.length;
    if (doneCount < ex.sets) {
      incomplete.push({ name: ex.name, done: doneCount, target: ex.sets });
    }
    if (doneCount === 0) continue;
    exercisesLogged++;
    
    const todayVol = todaySets.reduce((s, x) => s + x.weight * x.reps, 0);
    volumeToday += todayVol;
    const todayBestE1RM = Math.max(...todaySets.map(s => s.weight * (1 + s.reps / 30)));
    
    // All-time prior best → PR check
    let priorBestE1RM = 0;
    for (const l of priorLogs) {
      const e = l.weight * (1 + l.reps / 30);
      if (e > priorBestE1RM) priorBestE1RM = e;
    }
    if (priorLogs.length > 0 && todayBestE1RM > priorBestE1RM * 1.01) {
      prs.push({ name: ex.name, e1rm: Math.round(todayBestE1RM) });
    }
    
    // vs most recent prior session
    if (priorSessions.length > 0) {
      hasComparison = true;
      const lastSets = priorSessions[0].sets;
      volumeLast += lastSets.reduce((s, x) => s + x.weight * x.reps, 0);
      const lastBestE1RM = Math.max(...lastSets.map(s => s.weight * (1 + s.reps / 30)));
      if (todayBestE1RM > lastBestE1RM * 1.01) improved++;
      else if (todayBestE1RM < lastBestE1RM * 0.99) regressed++;
      else flat++;
    }
  }
  
  // Verdict
  let verdict, verdictColor, verdictEmoji;
  if (!hasComparison) {
    verdict = 'Baseline set'; verdictColor = '#3D7BFF'; verdictEmoji = '📋';
  } else if (prs.length > 0) {
    verdict = 'PR session!'; verdictColor = '#F2C12E'; verdictEmoji = '🏆';
  } else if (improved > regressed) {
    verdict = 'Stronger than last time'; verdictColor = '#37C871'; verdictEmoji = '📈';
  } else if (regressed > improved) {
    verdict = 'Down from last time'; verdictColor = '#F08C2E'; verdictEmoji = '📉';
  } else {
    verdict = 'Holding steady'; verdictColor = '#3D7BFF'; verdictEmoji = '➡️';
  }
  
  const volChange = volumeLast > 0 ? ((volumeToday - volumeLast) / volumeLast) * 100 : null;
  
  return { prs, incomplete, improved, regressed, flat, volumeToday, volumeLast, volChange, exercisesLogged, verdict, verdictColor, verdictEmoji, hasComparison, dayName: day.name };
}

function showSessionSummaryModal(s) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 16px;';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

async function moveExercise(idx, direction) {
  const day = SPLIT[selectedDay];
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= day.exercises.length) return;
  const arr = day.exercises;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  await saveOrder();
  render();
}

  render();

function sparkSVG(values, color) {
  // Tiny e1RM trend, oldest → newest
  if (!values || values.length < 2) return '';
  const w = 64, h = 20, pad = 2;
  const min = Math.min(...values), max = Math.max(...values);
  const span = (max - min) || 1;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / span) * (h - pad * 2);
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function isManualDone(exId, dayKey) {
  return manualDone[exId + '|' + dayKey] === localDateStr(new Date());
}
async function saveManualDone() {
  try { await window.storage.set('manual-done', JSON.stringify(manualDone)); } catch(e) {}
  try { localStorage.setItem('gym-tracker-manual-done', JSON.stringify(manualDone)); } catch(e) {}
}
async function saveEarlyFinishes() {
  try { await window.storage.set('early-finishes', JSON.stringify(earlyFinishes)); } catch(e) {}
  try { localStorage.setItem('gym-tracker-early-finishes', JSON.stringify(earlyFinishes)); } catch(e) {}
}
function regularSetsToday(exId) {
  return getTodaysSets(exId).filter(s => s.tag !== 'warmup' && s.tag !== 'dropset').length;
}
function earlyFinishesThisWeek() {
  const now = new Date();
  const ws = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysSinceMonday(now));
  ws.setHours(0, 0, 0, 0);
  return earlyFinishes.filter(e => new Date(e.date) >= ws).length;
}
// Guardrail: a tap on "Finish early" opens an honesty prompt rather than finishing instantly
function askFinish(exId) {
  if (regularSetsToday(exId) < 1) return; // no zero-effort skips
  finishConfirm = exId;
  cardOpen[exId] = true;
  render();
}
function cancelFinish() { finishConfirm = null; render(); }
async function confirmFinish(exId) {
  const done = regularSetsToday(exId);
  if (done < 1) { finishConfirm = null; render(); return; } // safety: at least one working set
  manualDone[exId + '|' + selectedDay] = localDateStr(new Date());
  cardOpen[exId] = false;
  finishConfirm = null;
  const ex = SPLIT[selectedDay].exercises.find(e => e.id === exId);
  earlyFinishes.push({ date: new Date().toISOString(), exId, day: selectedDay, done, target: ex ? ex.sets : null });
  await saveManualDone();
  await saveEarlyFinishes();
  render();
}
async function reopenEx(exId) {
  delete manualDone[exId + '|' + selectedDay];
  const t = localDateStr(new Date());
  earlyFinishes = earlyFinishes.filter(e => !(e.exId === exId && e.day === selectedDay && localDateStr(e.date) === t));
  await saveManualDone();
  await saveEarlyFinishes();
  render();
}

function renderHistory(exId) {
  const raw = logs[exId] || [];
  const tagged = raw.filter(l => l.day === selectedDay);
  const dayLogs = tagged.length > 0 ? tagged : raw.filter(l => !l.day);
  const sessions = groupByDate(dayLogs);
  if (sessions.length === 0) return '<div class="history"><div style="color:#6E695F;font-size:11px">No history yet</div></div>';
  return `<div class="history">${sessions.slice(0, 12).map(s => `
    <div class="history-row">
      <span>${new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})}</span>
      <span>${formatSets(s.sets)}</span>

  `).join('')}</div>`;
}

function toggleHistory(exId) {

async function logBodyweightSet(exId) {
  // Pre-fills 0kg then logs — shortcut for bodyweight exercises
  const regularSetCount = getTodaysSets(exId).filter(s => s.tag !== 'warmup' && s.tag !== 'dropset').length;
  const nextSetNum = regularSetCount + 1;
  const rEl = document.getElementById(`r-${exId}-set${nextSetNum}`);
  const wEl = document.getElementById(`w-${exId}-set${nextSetNum}`);
  if (!rEl) return;
  const r = parseInt(rEl.value);
  if (!r || r <= 0) { rEl.focus(); return; }
  if (wEl) wEl.value = '0';
  if (!logs[exId]) logs[exId] = [];
  
  const todayStr = localDateStr(new Date());
  const priorLogs = logs[exId].filter(l => localDateStr(l.date) !== todayStr);
  const hasPriorHistory = priorLogs.length > 0;
  // For BW sets, don't fire PR (0kg e1RM is meaningless for comparison)
  
  logs[exId].push({ date: new Date().toISOString(), weight: 0, reps: r, day: selectedDay, bw: true });
  await save();
  startTimer();
  render();
}

async function logRegularSet(exId) {
  const regularSetCount = getTodaysSets(exId).filter(s => s.tag !== 'warmup' && s.tag !== 'dropset').length;
  const nextSetNum = regularSetCount + 1;
  const wEl = document.getElementById(`w-${exId}-set${nextSetNum}`);
  const rEl = document.getElementById(`r-${exId}-set${nextSetNum}`);
  if (!wEl || !rEl) return;
  const w = parseFloat(wEl.value);
  const r = parseInt(rEl.value);
  // Allow 0kg for bodyweight exercises (bw flag), otherwise require positive weight
  const ex = Object.values(SPLIT).flatMap(d => d.exercises).find(e => e.id === exId);
  const isBW = ex?.bodyweight;
  if (isNaN(w) || (!isBW && w <= 0) || (isBW && w < 0) || !r || r <= 0) return;
  if (!logs[exId]) logs[exId] = [];
  
  // Check if this is a new PR — only if the exercise has prior history
  const todayStr = localDateStr(new Date());
  const allPriorLogs = logs[exId].filter(l => localDateStr(l.date) !== todayStr);
  // Compare against same-day history for accurate PRs (Week A and Week B track independently)
  const sameDayLogs = allPriorLogs.filter(l => l.day === selectedDay);
  const priorLogs = sameDayLogs.length > 0 ? sameDayLogs : allPriorLogs.filter(l => !l.day);
  const priorWorking = priorLogs.filter(l => l.tag !== 'warmup' && l.tag !== 'dropset' && l.weight > 0);
  const newE1RM = w * (1 + r / 30);
  
  // Three PR types, all day-isolated, working sets only:
  let priorBestE1RM = 0, priorMaxWeight = 0, priorBestRepsAtThisWeight = 0;
  for (const l of priorWorking) {
    const e = l.weight * (1 + l.reps / 30);
    if (e > priorBestE1RM) priorBestE1RM = e;
    if (l.weight > priorMaxWeight) priorMaxWeight = l.weight;
    if (l.weight === w && l.reps > priorBestRepsAtThisWeight) priorBestRepsAtThisWeight = l.reps;
  }
  const hasHistory = priorWorking.length > 0 && w > 0;
  let prType = null;
  if (hasHistory) {
    if (w > priorMaxWeight) prType = { label: 'WEIGHT PR', detail: `Heaviest ever: ${w}kg (was ${priorMaxWeight}kg)` };
    else if (w === priorMaxWeight && priorBestRepsAtThisWeight > 0 && r > priorBestRepsAtThisWeight) prType = { label: 'REP PR', detail: `${r} reps at ${w}kg (was ${priorBestRepsAtThisWeight})` };
    else if (priorBestE1RM > 0 && newE1RM > priorBestE1RM * 1.01) prType = { label: 'e1RM PR', detail: `Est. 1RM ${newE1RM.toFixed(1)}kg (was ${priorBestE1RM.toFixed(1)}kg)` };
  }
  
  logs[exId].push({ date: new Date().toISOString(), weight: w, reps: r, day: selectedDay });
  
  await save();
  if (navigator.vibrate) navigator.vibrate(prType ? [30, 40, 30] : 10);
  
  // Trophy: bib-styled, names the PR type
  if (prType) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-2deg); background: #F2EFE7; color: #141311; padding: 22px 30px; border-radius: 16px; border-top: 6px solid #E8443A; z-index: 998; text-align: center; box-shadow: 0 14px 44px rgba(0,0,0,0.7); min-width: 230px;';
    overlay.innerHTML = '<div style="font-size: 30px; margin-bottom: 4px;">🏆</div>'
      + '<div style="font-family: Anton, sans-serif; font-size: 24px; letter-spacing: 1.5px;">' + prType.label + '</div>'
      + '<div style="font-size: 14px; font-weight: 700; margin-top: 6px;">' + w + 'kg × ' + r + ' reps</div>'
      + '<div style="font-size: 12px; color: rgba(20,19,17,0.6); margin-top: 2px;">' + prType.detail + '</div>';
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 4000);
  }
  
  startTimer();
  render();
}


async function deleteLog(exId, date) {
  logs[exId] = (logs[exId] || []).filter(l => l.date !== date);
  await save();
  render();
}

async function updateLog(exId, date, newValue, field) {
  const log = (logs[exId] || []).find(l => l.date === date);
  if (!log) return;
  if (field === 'weight') {
    log.weight = parseFloat(newValue);
  } else if (field === 'reps') {
    log.reps = parseInt(newValue);
  }
  if (log.weight > 0 && log.reps > 0) {
    await save();
  }
}

function getPersonalBests() {
  // Best working-set e1RM per exercise across all history (weighted sets only)
  const nameById = {};
  for (const day of Object.values(SPLIT)) {
    for (const ex of day.exercises) if (!nameById[ex.id]) nameById[ex.id] = ex.name;
  }
  const bests = [];
  for (const [exId, entries] of Object.entries(logs)) {
    let best = null;
    for (const l of entries) {
      if (l.tag === 'warmup' || l.tag === 'dropset' || !l.weight || l.weight <= 0) continue;
      const e = l.weight * (1 + l.reps / 30);
      if (!best || e > best.e1rm) best = { e1rm: e, weight: l.weight, reps: l.reps, date: l.date };
    }
    if (best && nameById[exId]) bests.push({ name: nameById[exId], ...best });
  }
  return bests.sort((a, b) => b.e1rm - a.e1rm).slice(0, 8);
}

function e1rmChartSVG(values, color) {
  // Full-width session chart: e1RM per session, oldest → newest
  if (!values || values.length < 2) return '';
  const W = 320, H = 110, padL = 32, padR = 8, padY = 14;
  const min = Math.min(...values), max = Math.max(...values);
  const span = (max - min) || 1;
  const x = i => padL + (i / (values.length - 1)) * (W - padL - padR);
  const y = v => H - padY - ((v - min) / span) * (H - padY * 2);
  const line = values.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  return `
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block; margin: 6px 0 4px;">
      <line x1="${padL}" y1="${y(max)}" x2="${W-padR}" y2="${y(max)}" stroke="#36332C" stroke-width="1" stroke-dasharray="3 4"/>
      <line x1="${padL}" y1="${y(min)}" x2="${W-padR}" y2="${y(min)}" stroke="#36332C" stroke-width="1" stroke-dasharray="3 4"/>
      <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${values.map((v, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3" fill="#F2EFE7"/>`).join('')}
      <text x="2" y="${y(max) + 4}" font-size="9" fill="#A39E93" font-weight="700">${max.toFixed(0)}</text>
      <text x="2" y="${y(min) + 4}" font-size="9" fill="#6E695F">${min.toFixed(0)}</text>
    </svg>`;
}

function renderRunProgress() {

  }

  const byType = { regular: [], treadmill: [], interval: [], 'interval-treadmill': [] };
  runningLogs.forEach(run => {
    // Unknown/missing type (legacy imports, outdoor runs) buckets as regular instead of crashing
    (byType[run.type] || byType.regular).push(run);
  });

  const typeNames = { regular: '🏃 Regular Runs', treadmill: '🏃 Treadmill', interval: '⚡ Interval', 'interval-treadmill': '⚡ Interval Treadmill' };
  const activeTypes = Object.keys(byType).filter(t => byType[t].length > 0);

  return `
    <div style="display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;">
      ${activeTypes.map(t => `
        <div style="display: inline-block; padding: 6px 12px; background: ${progressFilter === t ? '#E8443A' : '#36332C'}; color: #fff; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600;" onclick="progressFilter = '${t}'; render();">${typeNames[t]}</div>

      const runs = byType[type];
      if (runs.length === 0 || (progressFilter !== 'all' && progressFilter !== type)) return '';
      
      const sortedRuns = runs.slice().sort((a,b) => new Date(a.date) - new Date(b.date));
      const totalDist = runs.reduce((sum, r) => sum + r.distance, 0);
      const totalTime = runs.reduce((sum, r) => sum + r.time, 0);
      const avgSpeed = (totalDist / totalTime * 60).toFixed(1);
      const fastestPace = Math.min(...runs.map(r => r.time / r.distance));
      const fastestPaceMin = Math.floor(fastestPace);
      const fastestPaceSec = Math.round((fastestPace - fastestPaceMin) * 60);
      
      const distances = sortedRuns.map(r => r.distance);
      const minDist = Math.min(...distances) * 0.9;
      const maxDist = Math.max(...distances) * 1.1;
      
      return `
        <div style="margin-bottom: 16px;">
          <div style="font-size: 13px; color: #A39E93; margin-bottom: 10px; font-weight: 600;">${typeNames[type]}</div>

              <div style="font-size: 10px; color: #6E695F;">in ${runs.length} runs</div>
            </div>
            <div style="background: #1B1A18; border: 1px solid #26241F; border-radius: 8px; padding: 10px; text-align: center;">

            </div>
            <div style="background: #1B1A18; border: 1px solid #26241F; border-radius: 8px; padding: 10px; text-align: center;">
              <div style="font-size: 11px; color: #6E695F;">Best Pace</div>

              }).join('')}

          </div>
        </div>
      `;
    }).join('')}
  `;
}

// ====== Rest Timer ======
function toggleTimer() {
  if (timerRunning) pauseTimer();
  else startTimer();
}

function startTimer() {
  // If timer is at 0 or finished, start a fresh rest period
  if (timerSeconds <= 0 || timerEndedNotified) {
    timerSeconds = REST_DURATION;
    timerEndedNotified = false;
  }
  timerRunning = true;
  // Anchor to an absolute end time so backgrounding doesn't lose track
  timerEndTime = Date.now() + timerSeconds * 1000;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tickTimer, 250);
  tickTimer();
}

function tickTimer() {
  if (!timerRunning || timerEndTime === null) return;
  const remaining = Math.max(0, Math.round((timerEndTime - Date.now()) / 1000));
  timerSeconds = remaining;
  if (remaining <= 0) {
    timerSeconds = 0;
    pauseTimer();
    if (!timerEndedNotified) {
      timerEndedNotified = true;
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
      playBeep();
    }
  }
  updateTimerUI();
}

function pauseTimer() {
  timerRunning = false;
  // Capture remaining time so resume continues from where it left off
  if (timerEndTime !== null) {
    timerSeconds = Math.max(0, Math.round((timerEndTime - Date.now()) / 1000));
  }
  timerEndTime = null;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  updateTimerUI();
}

function resetTimer() {
  pauseTimer();
  timerSeconds = REST_DURATION;
  timerEndTime = null;
  timerEndedNotified = false;
  updateTimerUI();
}

// Re-sync the moment the app comes back to the foreground
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && timerRunning) tickTimer();
});

function updateTimerUI() {
  const display = document.getElementById('timerDisplay');
  const timer = document.getElementById('restTimer');
  const btn = document.getElementById('timerStartBtn');
  const mins = Math.floor(timerSeconds / 60);
  const secs = timerSeconds % 60;
  display.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

  timer.classList.remove('running', 'warning', 'done');
  if (timerSeconds === 0) {
    timer.classList.add('done');
    display.textContent = "GO!";
  } else if (timerRunning && timerSeconds <= 10) {
    timer.classList.add('warning');
  } else if (timerRunning) {
    timer.classList.add('running');
  }
  btn.textContent = timerRunning ? '⏸' : '▶';
}

let audioCtx = null;
function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 3; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.4);
      gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + i * 0.4 + 0.05);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.4 + 0.25);
      osc.start(audioCtx.currentTime + i * 0.4);
      osc.stop(audioCtx.currentTime + i * 0.4 + 0.3);
    }
  } catch (e) {}
}

function getProgramWeek() {
  const now = new Date();
  if (now < PROGRAM_START) return 0;
  const diffDays = Math.floor((now - PROGRAM_START) / (1000*60*60*24));
  return Math.min(Math.floor(diffDays / 7) + 1, 15);
}

function getDaysToRace() {
  const now = new Date();
  return Math.ceil((RACE_DATE - now) / (1000*60*60*24));
}

function getCurrentPhase() {
  const w = getProgramWeek();
  if (w === 0) return 'Pre-Program';
  return RUN_PROGRAM[w-1] ? RUN_PROGRAM[w-1].phase : 'Complete';
}

function getReadiness() {
  const benchmarks = [
    { name: '5:00/km for 4km', dist: 4, pace: 5.0, week: 4 },
    { name: '4:50/km for 4km', dist: 4, pace: 4.83, week: 7 },
    { name: '4:30/km × 1km reps', dist: 1, pace: 4.5, week: 6 },
    { name: '4:30/km for 3km continuous', dist: 3, pace: 4.5, week: 9 },
    { name: '4:30/km for 6km continuous', dist: 6, pace: 4.5, week: 11 },
    { name: '4:30/km for 8km continuous', dist: 8, pace: 4.5, week: 12 },
    { name: '4:30/km for 10km (confidence run)', dist: 10, pace: 4.5, week: 13 }
  ];
  benchmarks.forEach(b => {
    b.hit = runningLogs.some(run => {
      if (!run.distance || !run.time) return false;
      const runPace = run.time / run.distance;
      return run.distance >= b.dist - 0.05 && runPace <= b.pace + 0.04;
    });
  });
  const hitCount = benchmarks.filter(b => b.hit).length;
  return { benchmarks, hitCount, total: benchmarks.length };
}

function getReadinessStatus() {
  const w = getProgramWeek();
  const { benchmarks, hitCount, total } = getReadiness();
  const due = benchmarks.filter(b => b.week <= w);
  const dueHit = due.filter(b => b.hit).length;
  const behind = due.length - dueHit;
  let status, color, msg;
  if (w === 0) {
    status = 'Not started'; color = '#A39E93';
    msg = 'Program starts June 1. Log your runs and the readiness gate will track whether 4:30/km is locked in.';
  } else if (behind === 0) {
    status = 'ON TRACK'; color = '#37C871';
    msg = `You have hit every pace benchmark due so far (${dueHit}/${due.length}). 4:30/km for 12k is on track. Keep training consistently.`;
  } else if (behind === 1) {
    status = 'SLIGHTLY BEHIND'; color = '#F2C12E';
    const missed = due.find(b => !b.hit);
    msg = `You are behind on one benchmark: "${missed.name}". Repeat that session before moving on. Do not progress until you have hit it — the plan only works if each step is proven.`;
  } else {
    status = 'BEHIND — ADJUST'; color = '#E8443A';
    msg = `You are behind on ${behind} benchmarks. Be honest: either training has been inconsistent, or the timeline needs adjusting. Better to find out now than on race day. Consider holding the current phase an extra week, or revising the goal to a pace you can prove.`;
  }
  return { status, color, msg, hitCount, total, behind };
}

function isSessionDone(s, sessionIndex) {
  // Match by order within the week — first run this week = session 0, second = session 1, etc.
  // This way it works regardless of which day you actually ran.
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setHours(0,0,0,0);
  weekStart.setDate(now.getDate() - daysSinceMonday(now)); // Monday start
  
  // Get all qualifying runs this week, sorted oldest first
  const thisWeekRuns = runningLogs
    .filter(r => {
      const d = new Date(r.date);
      return d >= weekStart && r.distance >= s.dist * 0.8;
    })
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  
  // Session i is done if there's an i-th run this week
  return thisWeekRuns.length > sessionIndex;
}

let runningSubTab = 'plan';

// ===== DYNAMIC ADJUSTMENT SYSTEM =====
// Tracks actual performance and adjusts phases based on benchmark achievement
function getPhasePerformance(phaseNum) {
  // phaseNum: 1=Base, 2=Threshold, 3=RacePrep, 4=Taper
  const phaseWeeks = { 1: [1,4], 2: [5,8], 3: [9,13], 4: [14,15] };
  const [startWeek, endWeek] = phaseWeeks[phaseNum];
  const { benchmarks, hitCount } = getReadiness();
  
  // Benchmarks relevant to this phase
  const phaseBenchmarks = benchmarks.filter(b => b.week >= startWeek && b.week <= endWeek);
  const phaseHits = phaseBenchmarks.filter(b => b.hit).length;
  const phaseTotal = phaseBenchmarks.length;
  const hitRatio = phaseTotal > 0 ? phaseHits / phaseTotal : 0;
  
  // Score: 0-1 scale
  // 1.0 = hit all benchmarks for phase
  // 0.5 = hit half
  // 0.0 = hit none
  return { hitCount: phaseHits, total: phaseTotal, ratio: hitRatio, phaseBenchmarks };
}

function getAdjustmentRecommendation() {
  const w = getProgramWeek();
  if (w === 0) return null; // program hasn't started
  
  const { benchmarks, hitCount, total } = getReadiness();
  
  // Current phase (1-4)
  const phaseNum = w <= 4 ? 1 : w <= 8 ? 2 : w <= 13 ? 3 : 4;
  const perf = getPhasePerformance(phaseNum);
  
  // Expected benchmarks hit by now (all benchmarks in completed weeks + current week's due)
  const currentPhaseWeeks = { 1: [1,4], 2: [5,8], 3: [9,13], 4: [14,15] };
  const [phaseStart, phaseEnd] = currentPhaseWeeks[phaseNum];
  const weeksInPhase = w - phaseStart + 1;
  const expectedHits = Math.ceil((weeksInPhase / (phaseEnd - phaseStart + 1)) * perf.total);
  const actualHits = perf.hitCount;
  const gap = expectedHits - actualHits;
  
  let action, color, msg;
  
  if (gap <= -1) {
    // Ahead: you've hit more benchmarks than expected
    action = 'ACCELERATE';
    color = '#37C871';
    msg = `You're ahead of schedule — hitting benchmarks early. Next phase will push intensity slightly: longer rep durations or faster sustained paces. Stay consistent.`;
  } else if (gap === 0) {
    // On track
    action = 'ON TRACK';
    color = '#3D7BFF';
    msg = `You're hitting benchmarks as planned. Stick with the current phase — consistency is what locks in race day.`;
  } else if (gap === 1) {
    // Slightly behind
    action = 'HOLD';
    color = '#F2C12E';
    const missedBench = perf.phaseBenchmarks.find(b => !b.hit);
    msg = `You're one benchmark behind this phase. Repeat the session for "${missedBench.name}" before moving forward — each step must be proven.`;
  } else {
    // Behind by >1
    action = 'REPEAT PHASE';
    color = '#E8443A';
    msg = `You're behind by ${gap} benchmarks. Hold this phase for another week and nail the missing sessions. Better to over-prepare than under-prepare before race day.`;
  }
  
  return { action, color, msg, phaseNum, gap, expectedHits, actualHits };
}

function getEffectiveProgram() {
  // Returns the program with dynamic adjustments applied
  // For now: if behind, extend current phase; if ahead, keep original (no compression to avoid burnout)
  const w = getProgramWeek();
  const adj = getAdjustmentRecommendation();
  
  if (!adj) return RUN_PROGRAM; // pre-program or no adjustment needed
  
  // If REPEAT PHASE, shift all future weeks forward by 1
  if (adj.action === 'REPEAT PHASE') {
    const shifted = RUN_PROGRAM.map((p, i) => ({
      ...p,
      week: p.week + (w >= p.week ? 1 : 0) // shift weeks at/past current
    }));
    return shifted;
  }
  
  // Otherwise return original (ON TRACK, HOLD, or ACCELERATE all follow planned path)
  return RUN_PROGRAM;
}
