function updatePace() {
  const isTreadmill = currentRunType === 'treadmill' || currentRunType === 'interval-treadmill';
  const input1 = parseFloat(document.getElementById('runDistance').value);
  const time = parseInt(document.getElementById('runTime').value);
  
  const paceMinKmEl = document.getElementById('paceMinPerKm');
  const paceKmPerHEl = document.getElementById('paceKmPerH');
  
  if (!input1 || !time || input1 <= 0 || time <= 0) {
    paceMinKmEl.textContent = isTreadmill && treadmillMode === 'distance' ? '--:--' : isTreadmill ? '--' : '--:--';
    paceKmPerHEl.textContent = '--';
    return;
  }
  
  if (isTreadmill && treadmillMode === 'speed') {
    // For treadmill speed mode: input1 is speed (km/h), calculate distance
    const speed = input1;
    const distance = (speed * time) / 60;
    paceMinKmEl.textContent = distance.toFixed(2);
    paceKmPerHEl.textContent = speed.toFixed(1);
  } else {
    // For regular/distance mode: input1 is distance, calculate pace
    const distance = input1;
    const paceMinKm = (time / distance);
    const paceMin = Math.floor(paceMinKm);
    const paceSec = Math.round((paceMinKm - paceMin) * 60);
    const paceStr = `${paceMin}:${paceSec.toString().padStart(2, '0')}`;
    const speed = (distance / time * 60).toFixed(1);
    
    paceMinKmEl.textContent = paceStr;
    paceKmPerHEl.textContent = speed;
  }
}

async function logRun() {
  const type = currentRunType;
  const isTreadmill = type === 'treadmill' || type === 'interval-treadmill';
  const input1 = parseFloat(document.getElementById('runDistance').value);
  const time = parseInt(document.getElementById('runTime').value);
  const notes = document.getElementById('runNotes').value;
  
  if (!input1 || !time || input1 <= 0 || time <= 0) {
    alert('Please enter valid values');
    return;
  }
  
  let distance;
  if (isTreadmill && treadmillMode === 'speed') {
    // input1 is speed (km/h)
    distance = (input1 * time) / 60;
  } else {
    // input1 is distance (km)
    distance = input1;
  }
  
  const pace = time / distance;
  const run = {
    date: new Date().toISOString(),
    type,
    distance: parseFloat(distance.toFixed(2)),
    time,
    pace,
    notes
  };
  
  checkBenchmarkHit(run); // must run BEFORE push — see function comment
  runningLogs.push(run);
  
  await save();
  document.getElementById('runDistance').value = '';
  document.getElementById('runTime').value = '';
  document.getElementById('runNotes').value = '';
  render();
}

function deleteRun(idx) {
  const today = localDateStr(new Date());
  const todaysRuns = runningLogs.filter(r => localDateStr(r.date) === today);
  const run = todaysRuns[idx];
  runningLogs = runningLogs.filter(r => r !== run);
  save();
  render();
}

function addInterval() {
  currentIntervals.push({ speed: 10, time: 5 });
  render();
}

function deleteInterval(idx) {
  currentIntervals.splice(idx, 1);
  render();
}

function updateInterval(idx, field, value) {
  if (field === 'speed') {
    currentIntervals[idx].speed = parseFloat(value) || 0;
  } else if (field === 'time') {
    currentIntervals[idx].time = parseInt(value) || 0;
  }
  updateIntervalTotals();
}

function updateIntervalTotals() {
  let totalDist = 0, totalTime = 0;
  for (const interval of currentIntervals) {
    totalDist += (interval.speed * interval.time) / 60;
    totalTime += interval.time;
  }
  const distEl = document.getElementById('totalDistance');
  const timeEl = document.getElementById('totalTime');
  if (distEl) distEl.textContent = totalDist.toFixed(2);
  if (timeEl) timeEl.textContent = totalTime;
}

async function logIntervalRun() {
  if (currentIntervals.length === 0) {
    alert('Add at least one interval');
    return;
  }
  
  let totalDist = 0, totalTime = 0;
  for (const interval of currentIntervals) {
    totalDist += (interval.speed * interval.time) / 60;
    totalTime += interval.time;
  }
  
  const type = currentRunType;
  const notes = document.getElementById('runNotes').value;
  const pace = totalTime / totalDist;
  
  const run = {
    date: new Date().toISOString(),
    type,
    distance: parseFloat(totalDist.toFixed(2)),
    time: totalTime,
    pace,
    notes,
    intervals: JSON.parse(JSON.stringify(currentIntervals))
  };
  
  checkBenchmarkHit(run); // must run BEFORE push — see function comment
  runningLogs.push(run);
  
  await save();
  currentIntervals = [];
  document.getElementById('runNotes').value = '';
  render();
}


function getDeloadSuggestion() {
  // Detect if 3+ lifts are stalled — requires at least 3 separate SESSIONS with no meaningful e1RM progress
  const stalledExercises = [];
  for (const [exId, logList] of Object.entries(logs)) {
    const sessions = groupByDate(logList);
    if (sessions.length < 3) continue; // need at least 3 sessions to call it a stall
    const [s1, s2, s3] = sessions; // most recent first
    const e1 = avgE1RM(s1.sets);
    const e2 = avgE1RM(s2.sets);
    const e3 = avgE1RM(s3.sets);
    const range = Math.max(e1, e2, e3) - Math.min(e1, e2, e3);
    if (range / e1 < 0.02) stalledExercises.push(exId); // <2% variation across 3 sessions = stall
  }
  return stalledExercises.length >= 3 ? stalledExercises : null;
}

function getPredictedRaceTime() {
  // A 12km prediction is only meaningful if based on longer runs (6km+).
  // A fast 5km tells you top-end pace, not endurance — these are different things.
  // Riegel formula: T2 = T1 × (D2/D1)^1.06
  // The closer the basis run is to 12km, the more reliable the prediction.
  const recentRuns = runningLogs.filter(r => {
    const daysAgo = (Date.now() - new Date(r.date)) / (1000 * 60 * 60 * 24);
    const pace = r.time / r.distance;
    return daysAgo <= 42 && r.distance >= 6 && pace < 7.0 && pace > 3.5;
  });
  
  if (recentRuns.length < 2) return null;
  
  // Use the longest recent run — closest to race distance is most reliable
  let basisRun = recentRuns[0];
  for (const r of recentRuns) {
    if (r.distance > basisRun.distance) basisRun = r;
  }
  
  const t1 = basisRun.time;
  const d1 = basisRun.distance;
  const d2 = 12;
  
  const predicted12kmTime = t1 * Math.pow(d2 / d1, 1.06);
  const mins = Math.floor(predicted12kmTime);
  const secs = Math.round((predicted12kmTime - mins) * 60);
  return { 
    time: predicted12kmTime, 
    display: `${mins}:${secs.toString().padStart(2, '0')}`,
    basedOn: `${d1}km run`,
    runsUsed: recentRuns.length
  };
}

function getWeeklySummary() {
  const now = new Date();
  const weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysSinceMonday(now));
  const weekEnd = new Date(weekStart.getTime() + 7 * 24 * 60 * 60 * 1000);
  // Compare local date STRINGS — avoids UTC-vs-local midnight mismatch across timezones
  const weekStartStr = localDateStr(weekStart);
  const weekEndStr = localDateStr(weekEnd);
  
  const inThisWeek = (dateStr) => {
    const s = localDateStr(dateStr);
    return s >= weekStartStr && s < weekEndStr;
  };
  
  const currentDays = currentWeek === 'A' ? WEEK_A : WEEK_B;
  const doneThisWeek = new Set();
  
  // 1. Days explicitly marked complete this week
  for (const dayKey of currentDays) {
    if (lastCompleted[dayKey] && inThisWeek(lastCompleted[dayKey])) {
      doneThisWeek.add(dayKey);
    }
  }
  
  // 2. Days with tagged log entries this week
  for (const dayKey of currentDays) {
    if (doneThisWeek.has(dayKey)) continue;
    const hasTaggedLogs = SPLIT[dayKey].exercises.some(ex =>
      (logs[ex.id] || []).some(l => l.day === dayKey && inThisWeek(l.date))
    );
    if (hasTaggedLogs) doneThisWeek.add(dayKey);
  }
  
  // 3. Untagged logs: group by date, find best-matching day for each date
  const untaggedByDate = {};
  for (const dayKey of currentDays) {
    for (const ex of SPLIT[dayKey].exercises) {
      for (const l of (logs[ex.id] || [])) {
        if (l.day || !inThisWeek(l.date)) continue;
        const dk = localDateStr(l.date);
        if (!untaggedByDate[dk]) untaggedByDate[dk] = {};
        untaggedByDate[dk][dayKey] = (untaggedByDate[dk][dayKey] || 0) + 1;
      }
    }
  }
  for (const dayCounts of Object.values(untaggedByDate)) {
    const best = Object.entries(dayCounts).sort((a,b) => b[1]-a[1])[0];
    if (best) doneThisWeek.add(best[0]);
  }
  
  const thisWeekRuns = runningLogs.filter(r => inThisWeek(r.date));
  const totalRunDist = thisWeekRuns.reduce((sum, r) => sum + r.distance, 0);
  
  return { completedDays: doneThisWeek.size, runsCompleted: thisWeekRuns.length, totalRunDist };
}

function getStreak() {
  // Count consecutive weeks with 3+ training sessions (lifts + runs combined)
  // The current (in-progress) week doesn't break the streak even if incomplete
  const SESSION_THRESHOLD = 3;
  const MS_WEEK = 7 * 24 * 60 * 60 * 1000;
  
  // Build a count of sessions per week (keyed by week-start timestamp)
  const sessionsByWeek = {};
  const tally = (dateStr) => {
    const d = new Date(dateStr);
    const ws = new Date(d);
    ws.setHours(0,0,0,0);
    ws.setDate(d.getDate() - daysSinceMonday(d)); // Monday start
    const key = ws.getTime();
    sessionsByWeek[key] = (sessionsByWeek[key] || 0) + 1;
  };
  Object.values(lastCompleted).forEach(tally);
  runningLogs.forEach(r => tally(r.date));
  
  // Current week start
  const now = new Date();
  const curWeekStart = new Date(now);
  curWeekStart.setHours(0,0,0,0);
  curWeekStart.setDate(now.getDate() - daysSinceMonday(now));
  let cursor = curWeekStart.getTime();
  
  let streak = 0;
  let isCurrentWeek = true;
  while (true) {
    const count = sessionsByWeek[cursor] || 0;
    if (count >= SESSION_THRESHOLD) {
      streak++;
    } else if (isCurrentWeek) {
      // Current week in progress — don't count it, but don't break streak
    } else {
      break; // a past week missed the threshold → streak ends
    }
    isCurrentWeek = false;
    cursor -= MS_WEEK;
    // Safety: stop if we go before any data (5 years back max)
    if (cursor < now.getTime() - MS_WEEK * 260) break;
  }
  
  return streak;
}

async function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    try {
      const data = JSON.parse(text);
      
      if (!confirm('This will overwrite all current data with the backup. Continue?')) return;
      
      // Restore data — note: SPLIT (exercise definitions) is NOT restored wholesale,
      // or an old backup would wipe newer exercise updates (flags, notes, rep ranges).
      // We only apply the exercise ORDER from the backup.
      if (data.currentWeek) currentWeek = data.currentWeek;
      if (data.SPLIT) {
        for (const dayKey of Object.keys(SPLIT)) {
          if (!data.SPLIT[dayKey] || !data.SPLIT[dayKey].exercises) continue;
          const orderIds = data.SPLIT[dayKey].exercises.map(e => e.id);
          const ordered = [];
          for (const exId of orderIds) {
            const ex = SPLIT[dayKey].exercises.find(e => e.id === exId);
            if (ex && !ordered.includes(ex)) ordered.push(ex);
          }
          for (const ex of SPLIT[dayKey].exercises) {
            if (!ordered.includes(ex)) ordered.push(ex);
          }
          SPLIT[dayKey].exercises = ordered;
        }
      }
      if (data.logs) logs = data.logs;
      if (data.nutritionLogs) { nutritionLogs = data.nutritionLogs; await saveNutrition(); }
      if (data.weightLogs) { weightLogs = data.weightLogs; await saveWeights(); }
      if (data.fuelPhase) { fuelPhase = data.fuelPhase; await saveFuelPhase(); }
      if (data.lastCompleted) lastCompleted = data.lastCompleted;
      if (data.earlyFinishes) { earlyFinishes = data.earlyFinishes; await saveEarlyFinishes(); }
      if (data.runningLogs) runningLogs = data.runningLogs;
      
      // Persist ALL data types (not just logs/runs)
      await save();
      await saveWeek();
      await saveLastCompleted();
      await saveOrder();
      
      alert('✓ Data restored successfully!');
      render();
    } catch (err) {
      alert('✗ Invalid JSON file: ' + err.message);
    }
  };
  input.click();
}

function checkBenchmarkHit(run) {
  // IMPORTANT: must be called BEFORE the run is pushed into runningLogs,
  // so getReadiness() reflects only prior runs and we can detect a NEW hit.
  if (!run.distance || !run.time) return false;
  const pace = run.time / run.distance;
  const { benchmarks } = getReadiness();
  for (const b of benchmarks) {
    if (b.hit) continue; // already achieved before this run
    // Same matching rule as getReadiness: distance meets-or-exceeds, pace fast enough
    if (run.distance >= b.dist - 0.05 && pace <= b.pace + 0.04) {
      benchmarkCelebration = { benchmark: b.name, show: true };
      setTimeout(() => { benchmarkCelebration.show = false; render(); }, 3000);
      return true;
    }
  }
  return false;
}

  URL.revokeObjectURL(url);
}

function getActivityByDate() {
  // localDateStr → { lift: bool, run: bool } across all history
  const map = {};
  const mark = (dateStr, kind) => {
    const k = localDateStr(dateStr);
    if (!map[k]) map[k] = { lift: false, run: false };
    map[k][kind] = true;
  };
  for (const entries of Object.values(logs)) for (const l of entries) mark(l.date, 'lift');
  for (const r of runningLogs) mark(r.date, 'run');
  for (const d of Object.values(lastCompleted)) mark(d, 'lift');
  return map;
}

function renderWeekDots(activity) {
  const now = new Date();
  const labels = ['M','T','W','T','F','S','S'];
  const todayDow = daysSinceMonday(now);
  let out = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - todayDow + i);
    const key = localDateStr(d);
    const a = activity[key];
    const on = a && (a.lift || a.run);
    out += `<div class="wk-dot ${on ? 'on' : ''} ${i === todayDow ? 'today' : ''}"><div class="d"></div><span>${labels[i]}</span></div>`;
  }
  return out;
}

function renderLedger(activity) {
  // 10-week dot grid, GitHub-style: columns = weeks (oldest left), rows = Sun..Sat
  const now = new Date();
  const todayKey = localDateStr(now);
  const startOfThisWeek = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysSinceMonday(now));
  let cols = '';
  for (let wk = 9; wk >= 0; wk--) {
    let cells = '';
    for (let dow = 0; dow < 7; dow++) {
      const d = new Date(startOfThisWeek.getFullYear(), startOfThisWeek.getMonth(), startOfThisWeek.getDate() - wk * 7 + dow);
      if (d > now) { cells += '<div class="lg" style="opacity:0.3;"></div>'; continue; }
      const key = localDateStr(d);
      const a = activity[key];
      let cls = '';
      if (a) {
        if (a.lift && a.run) cls = 'both';
        else if (a.lift) cls = 'lift';
        else if (a.run) cls = 'run';
      }
      cells += `<div class="lg ${cls} ${key === todayKey ? 'today' : ''}"></div>`;
    }
    cols += `<div class="ledger-col">${cells}</div>`;
  }
  return cols;
}

function getTodayTargets() {
  const mode = fuelPhase ? fuelPhase.mode : 'cut';
  const T = PHASE_TARGETS[mode];
  const dow = new Date().getDay();
  if (dow === 1 || dow === 3) return T.liftRun;
  if (dow === 2 || dow === 4 || dow === 5) return T.lift;
  return T.rest;
}

function getPhaseStatus() {
  // Like the running readiness: are weigh-ins tracking the phase's expected rate?
  if (!fuelPhase) return null;
  const meta = PHASE_META[fuelPhase.mode];
  const daysIn = Math.max(0, (Date.now() - new Date(fuelPhase.startDate)) / 86400000);
  const weeksIn = daysIn / 7;
  
  const recent = weightLogs.filter(e => new Date(e.date) >= new Date(fuelPhase.startDate))
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  if (daysIn < 7 || recent.length < 3) {
    return { verdict: 'tracking', color: 'var(--text-2)', daysIn: Math.round(daysIn),
      text: `Week ${Math.max(1, Math.ceil(weeksIn))} of the ${meta.name.toLowerCase()}. Keep weighing daily — a verdict needs 7+ days and 3+ weigh-ins.` };
  }
  
  // 5-entry average vs projection from the anchor
  const avgNow = recent.slice(0, 5).reduce((a, e) => a + e.kg, 0) / Math.min(5, recent.length);
  const projected = fuelPhase.startWeight + meta.rate * weeksIn;
  const diff = avgNow - projected; // + means heavier than projected
  const actualRate = (avgNow - fuelPhase.startWeight) / weeksIn;
  
  const isCut = fuelPhase.mode === 'cut';
  if (Math.abs(diff) <= 0.4) {
    return { verdict: 'ON TRACK', color: 'var(--green)', daysIn: Math.round(daysIn),
      text: `Averaging ${actualRate >= 0 ? '+' : ''}${actualRate.toFixed(2)}kg/wk vs ${meta.rate > 0 ? '+' : ''}${meta.rate}kg/wk target. Hold your current intake.` };
  }
  if ((isCut && diff > 0.4) || (!isCut && diff < -0.4)) {
    return { verdict: isCut ? 'STALLED' : 'BEHIND', color: 'var(--yellow)', daysIn: Math.round(daysIn),
      text: isCut
        ? `Weight isn't dropping vs plan (${actualRate >= 0 ? '+' : ''}${actualRate.toFixed(2)}kg/wk). Drop 100–150 cal/day and reassess in a week. Check Saturday water retention isn't masking it first.`
        : `Gaining slower than the surplus should produce. Add 100–150 cal (carbs, around training) and recheck next week.` };
  }
  return { verdict: isCut ? 'FAST' : 'TOO FAST', color: 'var(--yellow)', daysIn: Math.round(daysIn),
    text: isCut
      ? `Dropping faster than ${meta.band[0]}kg/wk — risk of losing lean. Add 100–150 cal back, keep protein at target, and watch your lifts hold.`
      : `Gaining above +0.3kg/wk — the extra is likely fat, not muscle. Trim 100–150 cal and confirm lifts are still climbing.` };
}

function weightChartSVG() {
  const byDay = {};
  for (const e of weightLogs.slice().sort((a,b) => new Date(a.date) - new Date(b.date))) {

  const W = 320, H = 130, padL = 30, padR = 10, padY = 14;
  const vals = pts.map(p => p[1]);
  let min = Math.min(...vals, goal) - 0.4;
  let max = Math.max(...vals, mode === 'bulk' ? goal : -Infinity) + 0.4;
  const x = i => padL + (i / (pts.length - 1)) * (W - padL - padR);
  const y = v => H - padY - ((v - min) / (max - min)) * (H - padY * 2);
  const line = pts.map((p, i) => `${x(i).toFixed(1)},${y(p[1]).toFixed(1)}`).join(' ');
  const gy = y(goal).toFixed(1);
  return `
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;">
      <line x1="${padL}" y1="${gy}" x2="${W - padR}" y2="${gy}" stroke="#37C871" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.8"/>

        <div class="bib-title">Cut or bulk?</div>
        <div class="bib-meta">Permanent goal: 11% body fat. Long game: ${CUT.finalGoalWeight}kg @ 11% (+${CUT.leanToAdd}kg lean). Choose a phase above to anchor your plan.</div>
      </div>`;
  } else if (mode === 'cut') {
    const toGo = latestW ? Math.max(0, latestW.kg - CUT.goalWeight) : CUT.scanWeight - CUT.goalWeight;
    bib = `
      <div class="bib">
        <div class="bib-label">Phase: cut · day ${status ? status.daysIn : 0} · target 11%</div>
        <div class="bib-title">${estBF.toFixed(1)}% → ${CUT.goalBF}%</div>
        <div class="bib-meta">Goal ${CUT.goalWeight}kg holding ${CUT.ffm}kg fat-free mass · then the bulk cycles begin</div>
        <div style="display: flex; gap: 18px; margin-top: 10px;">
          <div><div style="font-size:10px;font-weight:800;letter-spacing:1px;color:rgba(20,19,17,0.5);">CURRENT</div><div style="font-family:'Anton',sans-serif;font-size:22px;">${latestW ? latestW.kg.toFixed(1) + 'kg' : '—'}</div></div>
          <div><div style="font-size:10px;font-weight:800;letter-spacing:1px;color:rgba(20,19,17,0.5);">EST BF</div><div style="font-family:'Anton',sans-serif;font-size:22px;">${estBF.toFixed(1)}%</div></div>
          <div><div style="font-size:10px;font-weight:800;letter-spacing:1px;color:rgba(20,19,17,0.5);">TO GO</div><div style="font-family:'Anton',sans-serif;font-size:22px;">${toGo.toFixed(1)}kg</div></div>
        </div>
      </div>`;
  } else {
    const gained = latestW ? latestW.kg - fuelPhase.startWeight : 0;
    const driftCeil = 15; // mini-cut trigger
    bib = `
      <div class="bib" style="--stripe: var(--blue);">
        <div class="bib-label" >Phase: lean bulk · day ${status ? status.daysIn : 0} · +300 cal</div>
        <div class="bib-title">Build to ${CUT.finalGoalWeight}kg</div>
        <div class="bib-meta">+${CUT.leanToAdd}kg lean project · mini-cut when est BF hits ~${driftCeil}% or week 16</div>
        <div style="display: flex; gap: 18px; margin-top: 10px;">
          <div><div style="font-size:10px;font-weight:800;letter-spacing:1px;color:rgba(20,19,17,0.5);">CURRENT</div><div style="font-family:'Anton',sans-serif;font-size:22px;">${latestW ? latestW.kg.toFixed(1) + 'kg' : '—'}</div></div>
          <div><div style="font-size:10px;font-weight:800;letter-spacing:1px;color:rgba(20,19,17,0.5);">GAINED</div><div style="font-family:'Anton',sans-serif;font-size:22px;">${gained >= 0 ? '+' : ''}${gained.toFixed(1)}kg</div></div>
          <div><div style="font-size:10px;font-weight:800;letter-spacing:1px;color:rgba(20,19,17,0.5);">EST BF</div><div style="font-family:'Anton',sans-serif;font-size:22px;">${estBF.toFixed(1)}%</div></div>
        </div>
      </div>`;
  }
  
  return `
    ${phaseSeg}
    ${bib}
    ${flipBanner}
    
    ${status ? `
      <div class="card" style="border-left: 3px solid ${status.color};">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
          <span class="card-label" style="margin-bottom: 0;">Phase check</span>
          <span style="font-size: 13px; font-weight: 800; color: ${status.color}; letter-spacing: 0.5px;">${status.verdict}</span>
        </div>
        <div style="font-size: 12.5px; color: var(--text-2); line-height: 1.5;">${status.text}</div>
      </div>` : ''}
    
    <div class="card">
      <div class="card-label">Today · ${t.label} ${mode ? '· ' + mode : ''} target</div>
      ${bar('Calories', sum.kcal, t.kcal, 'var(--red)', '')}
      ${bar('Protein', sum.p, t.p, 'var(--green)', 'g')}
      ${bar('Carbs', sum.c, t.c, 'var(--blue)', 'g')}
      ${bar('Fat', sum.f, t.f, 'var(--yellow)', 'g')}
      
      <div class="card-label" style="margin: 14px 0 8px;">Quick add</div>
      <div style="display: flex; flex-wrap: wrap; gap: 6px;">
        ${STAPLES.map((s, i) => `<button class="btn-small" style="flex: 0 0 auto;" onclick="quickAddStaple(${i})">${s.name} <span style="color: var(--text-3);">${s.kcal}</span></button>`).join('')}
      </div>
      
      <div class="log-form" style="margin-top: 12px;">
        <input type="number" placeholder="kcal" id="nu-kcal">
        <input type="number" placeholder="P g" id="nu-p">
        <input type="number" placeholder="C g" id="nu-c">
        <input type="number" placeholder="F g" id="nu-f">
      </div>
      <button class="btn" style="width: 100%;" onclick="logNutrition()">+ Log food</button>
      ${todays.length > 0 ? `
        <div style="margin-top: 12px; border-top: 1px solid var(--line); padding-top: 8px;">
          ${todays.map(e => `
            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-2); padding: 4px 0;">
              <span>${e.name ? '<strong style=\'color:var(--text)\'>' + e.name + '</strong> · ' : ''}${Math.round(e.kcal)} cal · ${Math.round(e.p)}P / ${Math.round(e.c)}C / ${Math.round(e.f)}F</span>
              <button class="delete-btn" onclick="deleteNutrition('${e.date}')">✕</button>

        +${CUT.leanToAdd}kg lean to add (fat-free mass 58.2 → 62.3kg). Fat barely moves — this is a muscle project, measured in DEXA re-scans, not weeks.

        { n: '1', title: 'Cut to 11%', sub: '→ ' + CUT.goalWeight + 'kg · 4–6 wks · you are ' + (mode === 'cut' ? 'HERE' : 'past this'), active: mode === 'cut' },
        { n: '2', title: 'Lean bulk', sub: '+300 cal · 12–16 wks · +0.2–0.3kg/wk · BF drifts to 14–15%', active: mode === 'bulk' },
        { n: '3', title: 'Mini-cut', sub: '−400 cal · 4–6 wks · strip fat, hold muscle, back to 11%', active: false },
        { n: '↻', title: 'Repeat ×3', sub: 'each cycle keeps ~2kg lean · roughly 2 cycles · 12–18 months', active: false }

          <div><div style="font-size: 13.5px; font-weight: 800;">${s.title}</div><div style="font-size: 11.5px; color: var(--text-3);">${s.sub}</div></div>
        </div>`).join('')}
      <div style="font-size: 11px; color: var(--text-3); margin-top: 8px; line-height: 1.5;">Rules of the build: protein is already handled — every gap is carbs around training. If scale climbs but lifts stall, the surplus is going to fat: check sleep before adding food. Re-DEXA every 8–12 weeks.</div>
    </div>
  `;

async function quickAddStaple(i) {
  const s = STAPLES[i];
  nutritionLogs.push({ date: new Date().toISOString(), name: s.name, kcal: s.kcal, p: s.p, c: s.c, f: s.f });
  await saveNutrition();
  if (navigator.vibrate) navigator.vibrate(10);
  render();
}

function renderHome() {
  const summary = getWeeklySummary();
  const deloadSuggestion = getDeloadSuggestion();
  const w = getProgramWeek();
  const daysToRace = getDaysToRace();
  const streak = getStreak();
  const activity = getActivityByDate();
  
  // Today's lift session (Mon–Fri split, Saturday = makeup, Sunday = rest)
  const days = currentWeek === 'A' ? WEEK_A : WEEK_B;
  const dayIdx = new Date().getDay();
  const now2 = new Date();
  const wkStart = new Date(now2.getFullYear(), now2.getMonth(), now2.getDate() - daysSinceMonday(now2));
  const wkStartStr = localDateStr(wkStart);
  const wkEndStr = localDateStr(new Date(wkStart.getTime() + 7 * 86400000));
  const doneThisWeek = (dayKey) => {
    const d = lastCompleted[dayKey];
    if (!d) return false;
    const s = localDateStr(d);
    return s >= wkStartStr && s < wkEndStr;
  };
  
  let todayDayKey = null;
  let isMakeup = false;
  if (dayIdx >= 1 && dayIdx <= 5) {
    todayDayKey = days[dayIdx - 1];
  } else if (dayIdx === 6) {
    todayDayKey = days.find(k => !doneThisWeek(k)) || null;
    isMakeup = !!todayDayKey;
  }
  const todayDay = todayDayKey ? SPLIT[todayDayKey] : null;
  const isCompleted = todayDayKey && lastCompleted[todayDayKey] && doneThisWeek(todayDayKey);
  
  const todayRun = getTodayRunSession();
  
  // Weekly distance target from the program (fallback 15km outside the program)
  const progWeek = RUN_PROGRAM.find(x => x.week === w);
  const distTarget = progWeek ? progWeek.sessions.reduce((s, x) => s + (x.dist || 0), 0) : 15;
  const distPct = Math.min(100, (summary.totalRunDist / distTarget) * 100);
  
  // ── THE BIB: today's session as a race bib ──
  let bib;
  if (todayDay && !isCompleted) {
    bib = `
      <div class="bib">
        <div class="bib-label">${isMakeup ? 'Saturday makeup' : "Today's session"} · Week ${currentWeek}</div>
        <div class="bib-title">${shortDayName(todayDay.name)}</div>
        <div class="bib-meta">${todayDay.exercises.length} lifts · ${todayDay.exercises.filter(e => e.warmup).length} with warmup ramp</div>
        ${todayRun ? `<div class="bib-run"><span class="dot"></span>${todayRun.done ? '✓ Run done — ' : 'Run today: '}${todayRun.session.label} · ${todayRun.session.dist}km</div>` : ''}
        <button class="btn" onclick="activeTab='track'; selectedDay='${todayDayKey}'; cardOpen={}; render();">Start session →</button>
      </div>`;
  } else if (isCompleted) {
    bib = `
      <div class="bib done">
        <div class="bib-label">Today · Week ${currentWeek}</div>
        <div class="bib-stamp">✓ DONE</div>
        <div class="bib-title">${shortDayName(todayDay.name)}</div>
        ${todayRun && !todayRun.done ? `<div class="bib-run"><span class="dot"></span>Still to run: ${todayRun.session.label} · ${todayRun.session.dist}km</div>` : todayRun ? `<div class="bib-run"><span class="dot"></span>✓ Run done too. Full day.</div>` : ''}
        <button class="btn" style="background: var(--raised); color: var(--text); border: 1px solid var(--line);" onclick="undoMarkDayComplete('${todayDayKey}'); render();">↩ Undo complete</button>
      </div>`;
  } else {
    // Sunday rest / Saturday all caught up
    bib = `
      <div class="bib">
        <div class="bib-label">${dayIdx === 6 ? 'Saturday · all caught up' : 'Sunday · Week ' + currentWeek}</div>
        <div class="bib-title">Rest day</div>
        <div class="bib-meta">${dayIdx === 6 ? 'Every lift done this week. Recover hard.' : 'Recovery is where the work pays out.'}</div>
        ${todayRun && !todayRun.done ? `<div class="bib-run"><span class="dot"></span>Run today: ${todayRun.session.label} · ${todayRun.session.dist}km</div>` : ''}
      </div>`;
  }
  
  // ── Plate loader: 5 red plates for lifts, 3 blue for runs ──
  const liftPlates = Array.from({length: 5}, (_, i) =>
    `<div class="plate lift ${i < summary.completedDays ? 'full' : ''}"></div>`).join('');
  const runPlates = Array.from({length: 3}, (_, i) =>
    `<div class="plate run ${i < summary.runsCompleted ? 'full' : ''}"></div>`).join('');
  
  return `
    <div style="margin-bottom: 14px;">
      <p style="color: var(--text-2); font-size: 13px; font-weight: 600;">Week ${currentWeek} · ${w > 0 && w <= 15 ? 'Program week ' + w + '/15' : 'Pre-program'} · ${daysToRace > 0 ? daysToRace + ' days to race' : 'RACE WEEK'}</p>
    </div>
    
    ${bib}
    
    <div class="card">
      <div class="card-label">This week</div>
      <div class="plate-row">
        <span class="plate-name">Lifts</span>
        <div class="plate-track">${liftPlates}</div>
        <span class="plate-stat" style="color: var(--red);">${summary.completedDays}<span style="color:var(--text-3);font-size:12px;">/5</span></span>
      </div>
      <div class="plate-row">
        <span class="plate-name">Runs</span>
        <div class="plate-track">${runPlates}</div>
        <span class="plate-stat" style="color: var(--blue);">${summary.runsCompleted}<span style="color:var(--text-3);font-size:12px;">/3</span></span>
      </div>
      <div class="plate-row" style="margin-bottom: 0;">
        <span class="plate-name">Road</span>
        <div class="road-line">
          <div class="road-fill" style="width: ${distPct}%;"></div>
          <div class="road-runner" style="left: ${distPct}%;"></div>
        </div>
        <span class="plate-stat" style="color: var(--blue); min-width: 70px;">${summary.totalRunDist.toFixed(1)}<span style="color:var(--text-3);font-size:12px;">/${distTarget.toFixed(0)}km</span></span>
      </div>
      <div class="wk-row">
        <div class="wk-dots">${renderWeekDots(activity)}</div>
        <div class="streak-chip">${streak > 0 ? '🔥 ' + streak + ' wk streak' : '<span style="color:var(--text-3);font-weight:600;">No streak yet</span>'}</div>
      </div>
    </div>
    
    <div class="card">
      <div class="quote">“${getDailyQuote()}”</div>
    </div>
    
    ${(() => {
      // Backup nudge: browser storage can be evicted by the OS — exports are the real safety net
      let last = null;
      try { last = localStorage.getItem('gym-tracker-last-backup'); } catch(e) {}
      const days = last ? Math.floor((Date.now() - new Date(last)) / 86400000) : null;
      if (days !== null && days < 14) return '';
      let kb = 0;
      try { kb = Math.round(JSON.stringify({logs, runningLogs, nutritionLogs, weightLogs, lastCompleted}).length / 1024); } catch(e) {}
      return `
        <div class="card" style="border-left: 3px solid var(--yellow);">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
            <div>
              <div style="font-weight:800; font-size:13px; color:var(--yellow); margin-bottom:3px;">💾 ${days === null ? 'No backup yet' : days + ' days since backup'}</div>
              <div style="font-size:11.5px; color:var(--text-2); line-height:1.4;">Phones can evict browser storage. Your data (~${kb}KB) exports in one tap — do it fortnightly.</div>
            </div>
            <button class="btn" style="flex-shrink:0;" onclick="exportData()">Back up</button>
          </div>
        </div>`;
    })()}
    <div class="card">
      <div class="card-label">Training ledger · last 10 weeks</div>
      <div class="ledger">${renderLedger(activity)}</div>
      <div class="ledger-key">
        <span><i style="background:var(--red);"></i>Lift</span>
        <span><i style="background:var(--blue);"></i>Run</span>
        <span><i style="background:var(--yellow);"></i>Both</span>
      </div>
    </div>
    
    ${deloadSuggestion ? `
      <div class="card" style="border-left: 3px solid var(--yellow);">
        <div style="color: var(--yellow); font-weight: 800; margin-bottom: 6px; font-size: 13px;">⚠ Recovery check</div>
        <div style="font-size: 12.5px; color: var(--text-2); line-height: 1.5;">${deloadSuggestion.length} lifts are stalled across 3+ sessions. A deload week will reset the trend.</div>
      </div>
    ` : ''}
  `;
}
function render() {
  // Render benchmark celebration if active
  if (benchmarkCelebration?.show) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #E8443A; color: #000; padding: 24px; border-radius: 12px; font-weight: 700; font-size: 18px; z-index: 998; text-align: center; box-shadow: 0 8px 32px rgba(232,68,58,0.4);';
    overlay.textContent = `🎯 BENCHMARK HIT!\n${benchmarkCelebration.benchmark}`;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3000);
  }
  
  renderWeekIndicator();
  const c = document.getElementById('content');
  if (activeTab === 'home') {
    c.innerHTML = renderHome();
  } else if (activeTab === 'track') {
    c.innerHTML = renderDaySelector() + renderSession();
  } else if (activeTab === 'fuel') {
    c.innerHTML = renderFuel();
  } else if (activeTab === 'running') {
    c.innerHTML = renderRunning();
  } else {
    c.innerHTML = renderProgress();
  }
}

load();

// ===== Draggable rest timer =====
(function makeTimerDraggable() {
  const el = document.getElementById('restTimer');
  if (!el) return;
  const PAD = 8;
  let dragging = false, moved = false, startX = 0, startY = 0, origLeft = 0, origTop = 0;

  function clamp(left, top) {
    const r = el.getBoundingClientRect();
    const maxLeft = Math.max(PAD, window.innerWidth - r.width - PAD);
    const maxTop = Math.max(PAD, window.innerHeight - r.height - PAD);
    return [Math.min(Math.max(left, PAD), maxLeft), Math.min(Math.max(top, PAD), maxTop)];
  }
  function applyPos(left, top) {
    [left, top] = clamp(left, top);
    el.style.left = left + 'px';
    el.style.top = top + 'px';
    el.style.right = 'auto';
    el.style.bottom = 'auto';
  }
  function savePos() {
    try { localStorage.setItem('gym-timer-pos', JSON.stringify({ left: parseFloat(el.style.left), top: parseFloat(el.style.top) })); } catch (e) {}
  }

  el.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.timer-btn')) return; // let play/reset taps through
    dragging = true; moved = false;
    const r = el.getBoundingClientRect();
    origLeft = r.left; origTop = r.top;
    startX = e.clientX; startY = e.clientY;
    el.classList.add('dragging');
    try { el.setPointerCapture(e.pointerId); } catch (_) {}
  });
  el.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
    applyPos(origLeft + dx, origTop + dy);
  });
  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    if (moved) savePos();
    try { el.releasePointerCapture(e.pointerId); } catch (_) {}
  }
  el.addEventListener('pointerup', endDrag);
  el.addEventListener('pointercancel', endDrag);

  // Re-clamp on rotate/resize so it never ends up off-screen
  window.addEventListener('resize', () => {
    if (el.style.left) applyPos(parseFloat(el.style.left), parseFloat(el.style.top));
  });

  // Restore saved position
  try {
    const p = JSON.parse(localStorage.getItem('gym-timer-pos'));
    if (p && isFinite(p.left) && isFinite(p.top)) applyPos(p.left, p.top);
  } catch (e) {}
})();
